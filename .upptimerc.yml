# Upptime config — https://upptime.js.org/docs/configuration
#
# We use Upptime's data-collection actions (uptime-monitor, response-time-monitor,
# graphs-generator) but render the status page ourselves at pages-index/status.html
# so it slots into the existing GitHub Pages subpath structure.
owner: iamharryliu
repo: vigilant-broccoli

# Sites probed every UPDATE_INTERVAL minutes (workflow cron, default 5).
# All targets serve unauthenticated GET / via the Fastify service template.
sites:
  - name: LLM Service
    url: https://vb-llm-service.fly.dev/
    icon: https://vb-llm-service.fly.dev/favicon.ico
    maxResponseTime: 10000
  - name: Storage Service
    url: https://vb-storage-service.fly.dev/
    maxResponseTime: 10000
  - name: Email Service
    url: https://vb-email-service.fly.dev/
    maxResponseTime: 10000
  - name: Email Subscription Service
    url: https://email-subscription-service.fly.dev/
    maxResponseTime: 10000
  - name: VB Express
    url: https://vb-express.fly.dev/
    maxResponseTime: 10000

# Fly.io machines sleep under auto_stop_machines='stop'. Generous request timeout
# so cold starts (~1–3s) don't get flagged as outages.
user-agent: upptime-vigilant-broccoli
delay: 5000

status-website:
  # Unused — we render via pages-index/status.html. Kept so other Upptime tooling
  # has something well-formed to read if invoked.
  baseUrl: /vigilant-broccoli
  name: vigilant-broccoli status

assignees:
  - iamharryliu
