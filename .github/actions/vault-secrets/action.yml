name: Vault Secrets
description: Import secrets from Vault at vault.harryliu.dev (cloudflared tunnel, Cloudflare Access service token fetched from GCP Secret Manager via WIF).

inputs:
  gcp_workload_identity_provider:
    description: GCP Workload Identity Provider for fetching the Cloudflare Access service token
    required: true
  gcp_service_account:
    description: GCP service account for fetching the Cloudflare Access service token
    required: true
  secrets:
    description: Secrets to import (hashicorp/vault-action format)
    required: true
  export_token:
    description: Export the Vault token as VAULT_TOKEN
    required: false
    default: 'false'
  role:
    description: Vault JWT role to authenticate as
    required: false
    default: github-actions-role

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
      with:
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}

    - name: Fetch Cloudflare Access service token from Secret Manager
      id: cf-access
      uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3
      with:
        secrets: |-
          cf_access_client_id:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_ID
          cf_access_client_secret:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_SECRET

    - name: Import Secrets from Vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
      with:
        url: https://vault.harryliu.dev
        method: jwt
        role: ${{ inputs.role }}
        jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
        exportToken: ${{ inputs.export_token }}
        extraHeaders: |
          CF-Access-Client-Id: ${{ steps.cf-access.outputs.cf_access_client_id }}
          CF-Access-Client-Secret: ${{ steps.cf-access.outputs.cf_access_client_secret }}
        secrets: ${{ inputs.secrets }}
