name: Vault Secrets
description: Import secrets from Vault at vault.harryliu.dev (cloudflared tunnel, Cloudflare Access service token).

inputs:
  cf_access_client_id:
    description: Cloudflare Access service token client ID
    required: true
  cf_access_client_secret:
    description: Cloudflare Access service token client secret
    required: true
  secrets:
    description: Secrets to import (hashicorp/vault-action format)
    required: true
  export_token:
    description: Export the Vault token as VAULT_TOKEN
    required: false
    default: 'false'
  role:
    description: Vault JWT role to authenticate as
    required: false
    default: github-actions-role

runs:
  using: composite
  steps:
    - name: Import Secrets from Vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
      with:
        url: https://vault.harryliu.dev
        method: jwt
        role: ${{ inputs.role }}
        jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
        exportToken: ${{ inputs.export_token }}
        extraHeaders: |
          CF-Access-Client-Id: ${{ inputs.cf_access_client_id }}
          CF-Access-Client-Secret: ${{ inputs.cf_access_client_secret }}
        secrets: ${{ inputs.secrets }}
