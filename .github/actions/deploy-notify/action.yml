name: Deploy Notify
description: Emit a deploy status notification to the socket server.

inputs:
  status:
    description: 'started | success | failure'
    required: true
  job:
    description: Human-readable job name (e.g. main, deploy-npm-packages)
    required: true
  socket_server_url:
    description: Socket server URL
    required: true
  shared_app_token:
    description: Sender token for the socket server
    required: true
  started_at:
    description: Unix epoch seconds when the deploy started (for duration calculation)
    required: false
    default: ''
  affected_projects:
    description: Comma-separated list of affected nx projects
    required: false
    default: ''
  run_url:
    description: URL of the run to link in the notification (defaults to the current run)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install socket.io-client
      shell: bash
      run: npm install --no-save --ignore-scripts socket.io-client@4.8.3

    - name: Send notification
      shell: bash
      env:
        SOCKET_SERVER_URL: ${{ inputs.socket_server_url }}
        SHARED_APP_TOKEN: ${{ inputs.shared_app_token }}
        DEPLOY_STATUS: ${{ inputs.status }}
        DEPLOY_JOB: ${{ inputs.job }}
        DEPLOY_COMMIT: ${{ github.sha }}
        DEPLOY_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.workflow_run.head_commit.message }}
        DEPLOY_WORKFLOW: ${{ github.workflow }}
        DEPLOY_RUN_URL: ${{ inputs.run_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
        DEPLOY_STARTED_AT: ${{ inputs.started_at }}
        DEPLOY_AFFECTED_PROJECTS: ${{ inputs.affected_projects }}
      run: node ${{ github.action_path }}/../../scripts/deploy-notify.mjs || true
