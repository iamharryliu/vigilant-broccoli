name: test-rabbitmq

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  test-rabbitmq:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh vb-free-vm \
            --zone=us-east1-b \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              break
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: github-actions-role
          jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
          secrets: |
            kv/data/secrets RABBITMQ_CONNECTION_STRING | RABBITMQ_CONNECTION_STRING ;
            kv/data/secrets RABBITMQ_CA_CERT | RABBITMQ_CA_CERT ;

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Test RabbitMQ publish
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
        run: |
          npm install amqplib
          node -e "
          const amqplib = require('amqplib');
          const QUEUE = 'EMAIL';
          const caCert = process.env.RABBITMQ_CA_CERT;
          const socketOptions = caCert
            ? { ca: [Buffer.from(caCert, 'base64')], checkServerIdentity: () => undefined, servername: 'rabbitmq' }
            : undefined;

          (async () => {
            const connection = await amqplib.connect(process.env.RABBITMQ_CONNECTION_STRING, socketOptions);
            const channel = await connection.createConfirmChannel();
            await channel.assertQueue(QUEUE, { durable: true });
            const testMessage = {
              from: 'Harry Liu <contact@harryliu.dev>',
              to: 'harryliu1995@gmail.com',
              subject: '[CI] RabbitMQ Test',
              html: '<p>Automated test from GitHub Actions.</p>',
            };
            channel.sendToQueue(QUEUE, Buffer.from(JSON.stringify(testMessage)), { persistent: true });
            await channel.waitForConfirms();
            console.log('✓ Message published and confirmed');
            const { messageCount, consumerCount } = await channel.checkQueue(QUEUE);
            console.log('Queue status — messages:', messageCount, 'consumers:', consumerCount);
            await connection.close();
          })().catch(err => { console.error('Error:', err.message); process.exit(1); });
          "
