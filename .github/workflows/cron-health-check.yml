name: cron-health-check

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  actions: read
  contents: read
  id-token: write

env:
  GCP_PROJECT: vigilant-broccoli
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm
  VAULT_ROLE: github-actions-role
  VAULT_AUDIENCE: https://github.com/iamharryliu/vigilant-broccoli

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          secrets: |
            kv/data/secrets RABBITMQ_CONNECTION_STRING | RABBITMQ_CONNECTION_STRING ;
            kv/data/secrets RABBITMQ_CA_CERT | RABBITMQ_CA_CERT ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;

      - name: Run health checks
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
          SOCKET_SERVER_URL: ${{ env.SOCKET_SERVER_URL }}
        run: |
          PASS=0
          FAIL=0

          check() {
            local name="$1"
            local status="$2"
            if [ "$status" = "ok" ]; then
              echo "  ✓ $name"
              PASS=$((PASS + 1))
            else
              echo "  ✗ $name — $status"
              FAIL=$((FAIL + 1))
            fi
          }

          http_check() {
            local name="$1"
            local url="$2"
            local expected="${3:-200}"
            local code
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$url" 2>/dev/null) || code="timeout"
            if [ "$code" = "$expected" ]; then
              check "$name" "ok"
            else
              check "$name" "HTTP $code (expected $expected)"
            fi
          }

          echo "=== Infrastructure Health Check ==="
          echo ""

          echo "[Fly.io Apps]"
          http_check "vb-express" "https://vb-express.fly.dev"
          http_check "vb-email-service" "https://vb-email-service.fly.dev"

          echo ""
          echo "[Websites]"
          http_check "harryliu.dev" "https://harryliu.dev"
          http_check "cloud8skate.com" "https://cloud8skate.com"
          http_check "vb-next-demo.vercel.app" "https://vb-next-demo.vercel.app"

          echo ""
          echo "[GCP VM]"
          VM_STATUS=$(gcloud compute instances describe ${{ env.VM_NAME }} --zone=${{ env.GCP_ZONE }} --format='value(status)' 2>/dev/null) || VM_STATUS="unknown"
          if [ "$VM_STATUS" = "RUNNING" ]; then
            check "${{ env.VM_NAME }}" "ok"
          else
            check "${{ env.VM_NAME }}" "$VM_STATUS"
          fi

          echo ""
          echo "[GCP VM — Vault]"
          HEALTH=$(curl -k -s https://127.0.0.1:8200/v1/sys/health) || HEALTH=""
          if [ -n "$HEALTH" ]; then
            SEALED=$(echo "$HEALTH" | jq -r '.sealed')
            INITIALIZED=$(echo "$HEALTH" | jq -r '.initialized')
            if [ "$SEALED" = "false" ] && [ "$INITIALIZED" = "true" ]; then
              check "vault" "ok"
            elif [ "$SEALED" = "true" ]; then
              check "vault" "sealed"
            else
              check "vault" "initialized=$INITIALIZED sealed=$SEALED"
            fi
          else
            check "vault" "unreachable"
          fi

          echo ""
          echo "[OCI VM — RabbitMQ Management]"
          PROTO_STRIPPED="${RABBITMQ_CONNECTION_STRING#amqps://}"
          USER_PASS="${PROTO_STRIPPED%@*}"
          HOST_PORT="${PROTO_STRIPPED##*@}"
          RMQ_USER="${USER_PASS%%:*}"
          RMQ_PASS="${USER_PASS#*:}"
          RMQ_HOST="${HOST_PORT%%:*}"
          echo "::add-mask::$RMQ_PASS"
          echo "$RABBITMQ_CA_CERT" | base64 -d > /tmp/rabbitmq-ca.crt
          RMQ_CODE=$(curl -s -o /tmp/mgmt.json -w '%{http_code}' --max-time 15 \
            --cacert /tmp/rabbitmq-ca.crt \
            --resolve "rabbitmq:15671:${RMQ_HOST}" \
            -u "${RMQ_USER}:${RMQ_PASS}" \
            "https://rabbitmq:15671/api/overview" 2>/dev/null) || RMQ_CODE="timeout"
          if [ "$RMQ_CODE" = "200" ]; then
            VERSION=$(grep -o '"rabbitmq_version":"[^"]*"' /tmp/mgmt.json | cut -d'"' -f4)
            check "rabbitmq broker (version: $VERSION)" "ok"
          else
            check "rabbitmq broker" "HTTP $RMQ_CODE (expected 200)"
          fi

          echo ""
          echo "[OCI VM — Socket Server]"
          SOCKET_CODE=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 15 "${SOCKET_SERVER_URL}/health" 2>/dev/null) || SOCKET_CODE="timeout"
          if [ "$SOCKET_CODE" = "200" ]; then
            check "socket-server-socketio" "ok"
          else
            check "socket-server-socketio" "HTTP $SOCKET_CODE (expected 200)"
          fi

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="
          [ "$FAIL" -eq 0 ] || exit 1
