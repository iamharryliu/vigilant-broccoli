name: test-smoke-email-service

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test-email-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;

      - name: Test email service
        env:
          SHARED_APP_TOKEN: ${{ env.SHARED_APP_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST https://vb-email-service.fly.dev/api/queue-emails \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${SHARED_APP_TOKEN}" \
            -d '[{"from":"Harry Liu <ci-test@harryliu.dev>","to":"harryliu1995@gmail.com","subject":"ci-test: Email Service Test","html":"<p>Automated test from GitHub Actions.</p>"}]')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Email service test passed"
          else
            echo "✗ Email service test failed"
            exit 1
          fi
