name: deploy
on:
  push:
    branches: ['main']
    paths:
      - 'projects/nx-workspace/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: iamharryliu

jobs:
  notify-start:
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;
            kv/data/secrets SOCKET_SERVER_CA_CERT | SOCKET_SERVER_CA_CERT ;

      - name: Notify started
        uses: ./.github/actions/deploy-notify
        with:
          status: started
          job: deploy
          socket_server_url: ${{ env.SOCKET_SERVER_URL }}
          shared_app_token: ${{ env.SHARED_APP_TOKEN }}
          socket_server_ca_cert: ${{ env.SOCKET_SERVER_CA_CERT }}


  deploy-npm-packages:
    needs: notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace
        with:
          registry-url: 'https://registry.npmjs.org'
          update-npm: 'true'

      - name: Check if npm publish needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            PROJECTS_COMMA=$(pnpm exec nx show projects --withTarget=publish-package | tr '\n' ',' | sed 's/,$//')
          else
            PROJECTS_COMMA=$(pnpm exec nx show projects --affected --withTarget=publish-package --base=$NX_BASE --head=$NX_HEAD | tr '\n' ',' | sed 's/,$//')
          fi

          if [[ -n "$PROJECTS_COMMA" ]]; then
            echo "has_packages=true" >> $GITHUB_OUTPUT
            echo "affected_projects=$PROJECTS_COMMA" >> $GITHUB_OUTPUT
          else
            echo "has_packages=false" >> $GITHUB_OUTPUT
          fi

      - name: Build affected packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: pnpm exec nx run-many -t build --projects="${{ steps.check.outputs.affected_projects }}"

      - name: Publish npm packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: pnpm exec nx run-many -t publish-package --projects="${{ steps.check.outputs.affected_projects }}"

  deploy-apps:
    needs: notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace

      - name: Check if deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            echo "has_deployments=true" >> $GITHUB_OUTPUT
            echo "deploy_cmd=pnpm exec nx run-many -t deploy" >> $GITHUB_OUTPUT
          else
            AFFECTED_COMMA=$(pnpm exec nx show projects --affected --withTarget=deploy --base=$NX_BASE --head=$NX_HEAD | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$AFFECTED_COMMA" ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
              echo "deploy_cmd=pnpm exec nx run-many -t deploy --projects=\"$AFFECTED_COMMA\"" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up QEMU
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Import Secrets from Vault
        if: steps.check.outputs.has_deployments == 'true'
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          export_token: 'true'
          secrets: |
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ACCOUNT_ID ;
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ID ;
            kv/data/secrets CLOUDFLARE_API_TOKEN_VB_DEPLOY_NX_APPS | CLOUDFLARE_API_TOKEN ;
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;
            kv/data/secrets DOCKERHUB_TOKEN | DOCKERHUB_TOKEN ;
            kv/data/secrets SANITY_AUTH_TOKEN | SANITY_AUTH_TOKEN ;

      - name: Log in to Docker Hub
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
        if: steps.check.outputs.has_deployments == 'true'

      - name: Deploy affected apps
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          COMMIT_SHA: ${{ github.sha }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://127.0.0.1:8200
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/projects/nx-workspace/scripts/vault-ca.crt
        run: ${{ steps.check.outputs.deploy_cmd }}

  deploy-github-pages:
    needs: notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace

      - name: Check if pages deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)
          PAGES_INDEX_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^projects/nx-workspace/pages-index/" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 || "$PAGES_INDEX_CHANGED" -gt 0 ]]; then
            echo "has_deployments=true" >> $GITHUB_OUTPUT
          else
            AFFECTED=$(pnpm exec nx show projects --affected --withTarget=deploy-github-pages --base=$NX_BASE --head=$NX_HEAD)
            if [[ -n "$AFFECTED" ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stage component-library pages artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/react-component-library/
        run: pnpm exec nx run component-library:deploy-github-pages --skip-nx-cache

      - name: Stage docs-md pages artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/docs-md/
        run: pnpm exec nx run docs-md:deploy-github-pages --skip-nx-cache

      - name: Stage pages-index landing artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        run: |
          mkdir -p _site
          cp pages-index/*.html _site/

      - name: Setup Pages
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: 'projects/nx-workspace/_site'
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
