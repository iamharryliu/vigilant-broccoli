name: deploy
run-name: deploy (${{ inputs.environment || (github.ref_name == 'production' && 'production' || 'staging') }})
on:
  push:
    branches: ['main', 'production']
    paths:
      - 'projects/nx-workspace/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        default: staging
        options:
          - staging
          - production
  workflow_call:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: iamharryliu
  DEPLOY_ENVIRONMENT: ${{ inputs.environment || (github.ref_name == 'production' && 'production' || 'staging') }}

jobs:
  notify-start:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;

      - name: Notify started
        uses: ./.github/actions/deploy-notify
        with:
          status: started
          job: deploy
          socket_server_url: ${{ env.SOCKET_SERVER_URL }}
          shared_app_token: ${{ env.SHARED_APP_TOKEN }}

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-npm-packages:
    needs: gitleaks
    if: ${{ (inputs.environment || (github.ref_name == 'production' && 'production' || 'staging')) == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets NPM_TOKEN | NODE_AUTH_TOKEN ;

      - name: Check if npm publish needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          PROJECTS_COMMA=$(pnpm exec nx show projects --withTarget=publish-package | tr '\n' ',' | sed 's/,$//')

          if [[ -n "$PROJECTS_COMMA" ]]; then
            echo "has_packages=true" >> $GITHUB_OUTPUT
            echo "projects=$PROJECTS_COMMA" >> $GITHUB_OUTPUT
          else
            echo "has_packages=false" >> $GITHUB_OUTPUT
          fi

      - name: Build packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: pnpm exec nx run-many -t build --projects="${{ steps.check.outputs.projects }}"

      - name: Publish npm packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: pnpm exec nx run-many -t publish-package --projects="${{ steps.check.outputs.projects }}"

  deploy-apps:
    needs: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace

      - name: Check if deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          DEPLOY_TARGET="deploy"
          if [[ "$DEPLOY_ENVIRONMENT" == "production" ]]; then
            DEPLOY_TARGET="deploy:production"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_ENVIRONMENT" == "production" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            echo "has_deployments=true" >> $GITHUB_OUTPUT
            echo "deploy_cmd=pnpm exec nx run-many -t $DEPLOY_TARGET" >> $GITHUB_OUTPUT
          else
            AFFECTED_COMMA=$(pnpm exec nx show projects --affected --withTarget=$DEPLOY_TARGET --base=$NX_BASE --head=$NX_HEAD | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$AFFECTED_COMMA" ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
              echo "deploy_cmd=pnpm exec nx run-many -t $DEPLOY_TARGET --projects=\"$AFFECTED_COMMA\"" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up QEMU
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Import Secrets from Vault
        if: steps.check.outputs.has_deployments == 'true'
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          export_token: 'true'
          secrets: |
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ACCOUNT_ID ;
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ID ;
            kv/data/secrets CLOUDFLARE_API_TOKEN_VB_DEPLOY_NX_APPS | CLOUDFLARE_API_TOKEN ;
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;
            kv/data/secrets DOCKERHUB_TOKEN | DOCKERHUB_TOKEN ;
            kv/data/secrets SANITY_AUTH_TOKEN | SANITY_AUTH_TOKEN ;

      - name: Fetch Cloudflare Access service token from Secret Manager
        id: cf-access
        if: steps.check.outputs.has_deployments == 'true'
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3
        with:
          secrets: |-
            CF_ACCESS_CLIENT_ID:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_ID
            CF_ACCESS_CLIENT_SECRET:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_SECRET

      - name: Log in to Docker Hub
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
        if: steps.check.outputs.has_deployments == 'true'

      - name: Deploy affected apps
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          COMMIT_SHA: ${{ github.sha }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://vault.harryliu.dev
          CF_ACCESS_CLIENT_ID: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_SECRET }}
        run: ${{ steps.check.outputs.deploy_cmd }}

  deploy-github-pages:
    needs: gitleaks
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nx-workspace

      - name: Check if pages deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            echo "has_deployments=true" >> $GITHUB_OUTPUT
          else
            AFFECTED=$(pnpm exec nx show projects --affected --withTarget=deploy-github-pages --base=$NX_BASE --head=$NX_HEAD)
            if [[ -n "$AFFECTED" ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stage component-library pages artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/react-component-library/
        run: pnpm exec nx run component-library:deploy-github-pages --skip-nx-cache

      - name: Stage pages-index landing artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/
        run: pnpm exec nx run pages-index:deploy-github-pages --skip-nx-cache

      - name: Setup Pages
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: 'projects/nx-workspace/_site'
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
