name: deploy
on:
  push:
    branches: ['main']
    paths:
      - 'projects/nx-workspace/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

env:
  GCP_PROJECT: vigilant-broccoli
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm
  VAULT_ROLE: github-actions-role
  VAULT_AUDIENCE: https://github.com/iamharryliu/vigilant-broccoli
  DOCKERHUB_USERNAME: iamharryliu

jobs:
  notify-start:
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;
            kv/data/secrets SOCKET_SERVER_CA_CERT | SOCKET_SERVER_CA_CERT ;

      - name: Notify started
        uses: ./.github/actions/deploy-notify
        with:
          status: started
          job: deploy
          socket_server_url: ${{ env.SOCKET_SERVER_URL }}
          shared_app_token: ${{ env.SHARED_APP_TOKEN }}
          socket_server_ca_cert: ${{ env.SOCKET_SERVER_CA_CERT }}


  deploy-npm-packages:
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    needs: notify-start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Check if npm publish needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            PROJECTS_COMMA=$(pnpm exec nx show projects --withTarget=publish-package | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$PROJECTS_COMMA" ]]; then
              echo "has_packages=true" >> $GITHUB_OUTPUT
              echo "affected_projects=$PROJECTS_COMMA" >> $GITHUB_OUTPUT
            else
              echo "has_packages=false" >> $GITHUB_OUTPUT
            fi
          else
            BASE="${{ github.event.before }}"
            if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE commit $BASE not found, falling back to origin/main"
              BASE="origin/main"
            fi

            AFFECTED_COMMA=$(pnpm exec nx show projects --affected --withTarget=publish-package --base=$BASE --head=${{ github.sha }} | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$AFFECTED_COMMA" ]]; then
              echo "has_packages=true" >> $GITHUB_OUTPUT
              echo "affected_projects=$AFFECTED_COMMA" >> $GITHUB_OUTPUT
            else
              echo "has_packages=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build affected packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: npx nx run-many -t build --projects="${{ steps.check.outputs.affected_projects }}"

      - name: Publish npm packages
        if: steps.check.outputs.has_packages == 'true'
        working-directory: ./projects/nx-workspace
        run: npx nx run-many -t publish-package --projects="${{ steps.check.outputs.affected_projects }}"

  main:
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    needs: notify-start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Check if deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            echo "has_deployments=true" >> $GITHUB_OUTPUT
            echo "deploy_cmd=pnpm exec nx run-many -t deploy" >> $GITHUB_OUTPUT
          else
            BASE="${{ github.event.before }}"

            if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE commit $BASE not found, falling back to origin/main"
              BASE="origin/main"
            fi

            AFFECTED_COMMA=$(pnpm exec nx show projects --affected --withTarget=deploy --base=$BASE --head=${{ github.sha }} | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$AFFECTED_COMMA" ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
              echo "deploy_cmd=pnpm exec nx run-many -t deploy --projects=\"$AFFECTED_COMMA\"" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up QEMU
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Authenticate to Google Cloud
        if: steps.check.outputs.has_deployments == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        if: steps.check.outputs.has_deployments == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Setup Vault CA Certificate
        if: steps.check.outputs.has_deployments == 'true'
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        if: steps.check.outputs.has_deployments == 'true'
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &

          SSH_PID=$!
          echo "SSH_PID=$SSH_PID" >> $GITHUB_ENV

          echo "Waiting for tunnel to establish..."
          for i in {1..60}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              curl -k -s https://127.0.0.1:8200/v1/sys/health | jq .
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        if: steps.check.outputs.has_deployments == 'true'
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          exportToken: true
          secrets: |
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ACCOUNT_ID ;
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ID ;
            kv/data/secrets CLOUDFLARE_API_TOKEN_VB_DEPLOY_NX_APPS | CLOUDFLARE_API_TOKEN ;
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;
            kv/data/secrets DOCKERHUB_TOKEN | DOCKERHUB_TOKEN ;

      - name: Log in to Docker Hub
        if: steps.check.outputs.has_deployments == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
        if: steps.check.outputs.has_deployments == 'true'

      - name: Deploy affected apps
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        env:
          COMMIT_SHA: ${{ github.sha }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://127.0.0.1:8200
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/projects/nx-workspace/scripts/vault-ca.crt
        run: ${{ steps.check.outputs.deploy_cmd }}

  deploy-github-pages:
    if: ${{ !startsWith(github.event.head_commit.message, 'docs') }}
    needs: notify-start
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Check if pages deployment needed
        id: check
        working-directory: ./projects/nx-workspace
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          DEPLOY_YML_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^\.github/workflows/deploy\.yml$" || true)
          PAGES_INDEX_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^projects/nx-workspace/pages-index/" || true)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$DEPLOY_YML_CHANGED" -gt 0 ]]; then
            ALL_PROJECTS=$(pnpm exec nx show projects --withTarget=deploy-github-pages | tr '\n' ',' | sed 's/,$//')
            echo "has_deployments=true" >> $GITHUB_OUTPUT
            echo "affected_projects=$ALL_PROJECTS" >> $GITHUB_OUTPUT
          else
            BASE="${{ github.event.before }}"
            if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE commit $BASE not found, falling back to origin/main"
              BASE="origin/main"
            fi

            AFFECTED_COMMA=$(pnpm exec nx show projects --affected --withTarget=deploy-github-pages --base=$BASE --head=${{ github.sha }} | tr '\n' ',' | sed 's/,$//')

            if [[ -n "$AFFECTED_COMMA" || "$PAGES_INDEX_CHANGED" -gt 0 ]]; then
              echo "has_deployments=true" >> $GITHUB_OUTPUT
              echo "affected_projects=$AFFECTED_COMMA" >> $GITHUB_OUTPUT
            else
              echo "has_deployments=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stage component-library pages artifact
        if: steps.check.outputs.has_deployments == 'true' && contains(steps.check.outputs.affected_projects, 'component-library')
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/react-component-library/
        run: pnpm exec nx run component-library:deploy-github-pages

      - name: Stage docs-md pages artifact
        if: steps.check.outputs.has_deployments == 'true' && contains(steps.check.outputs.affected_projects, 'docs-md')
        working-directory: ./projects/nx-workspace
        env:
          VITE_BASE_PATH: /vigilant-broccoli/docs-md/
        run: pnpm exec nx run docs-md:deploy-github-pages

      - name: Stage pages-index landing artifact
        if: steps.check.outputs.has_deployments == 'true'
        working-directory: ./projects/nx-workspace
        run: |
          mkdir -p _site
          cp pages-index/index.html _site/index.html

      - name: Setup Pages
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: 'projects/nx-workspace/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.check.outputs.has_deployments == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
