name: ci-rotate-secrets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "rotate" to confirm rotation of SHARED_APP_TOKEN and VB_EXPRESS_API_KEY'
        required: true

permissions:
  actions: write
  contents: read
  id-token: write
  pages: write

jobs:
  notify-start:
    if: ${{ github.event.inputs.confirm == 'rotate' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;

      - name: Notify started
        uses: ./.github/actions/deploy-notify
        with:
          status: rotation-started
          job: rotate-secrets
          socket_server_url: ${{ env.SOCKET_SERVER_URL }}
          shared_app_token: ${{ env.SHARED_APP_TOKEN }}

  rotate:
    needs: notify-start
    if: ${{ github.event.inputs.confirm == 'rotate' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          role: github-actions-rotate-role
          export_token: 'true'
          secrets: |
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;
            kv/data/secrets RESEND_API_KEY | RESEND_API_KEY ;
            kv/data/secrets OCI_VM_SSH_KEY | OCI_VM_SSH_KEY ;

      - name: Fetch Cloudflare Access service token from Secret Manager
        id: cf-access
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3
        with:
          secrets: |-
            CF_ACCESS_CLIENT_ID:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_ID
            CF_ACCESS_CLIENT_SECRET:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_SECRET

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Verify FLY_API_TOKEN from Vault
        run: flyctl apps list > /dev/null && echo "FLY_API_TOKEN is valid"

      - name: Rotate Vault Secrets
        working-directory: ./projects/nx-workspace
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://vault.harryliu.dev
          CF_ACCESS_CLIENT_ID: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_SECRET }}
        run: pnpm exec tsx scripts/rotate-vault-secrets.ts

      - name: Sync SENDER_TOKEN to Socket Server VM
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://vault.harryliu.dev
          CF_ACCESS_CLIENT_ID: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_SECRET }}
        run: ./infrastructure/terraform/packer/scripts/sync-socket-server-token.sh

      - name: Rotate Resend API Key
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://vault.harryliu.dev
          CF_ACCESS_CLIENT_ID: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_SECRET }}
        run: ./infrastructure/terraform/packer/scripts/rotate-resend-key.sh

  deploy:
    needs: rotate
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
