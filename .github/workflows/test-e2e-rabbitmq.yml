name: test-e2e-rabbitmq

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['deploy']
    types: [completed]
    branches: [main]

concurrency:
  group: vault-iap-tunnel
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm
  VAULT_ROLE: github-actions-role
  VAULT_AUDIENCE: https://github.com/iamharryliu/vigilant-broccoli

jobs:
  test-rabbitmq:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install amqplib
        run: npm install --no-save amqplib@0.10

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          secrets: |
            kv/data/secrets RABBITMQ_CONNECTION_STRING | RABBITMQ_CONNECTION_STRING ;
            kv/data/secrets RABBITMQ_CA_CERT | RABBITMQ_CA_CERT ;

      - name: Parse broker host + credentials
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
        run: |
          PROTO_STRIPPED="${RABBITMQ_CONNECTION_STRING#amqps://}"
          USER_PASS="${PROTO_STRIPPED%@*}"
          HOST_PORT="${PROTO_STRIPPED##*@}"
          RMQ_USER="${USER_PASS%%:*}"
          RMQ_PASS="${USER_PASS#*:}"
          RMQ_HOST="${HOST_PORT%%:*}"
          echo "::add-mask::$RMQ_PASS"
          echo "RMQ_HOST=$RMQ_HOST" >> $GITHUB_ENV
          echo "RMQ_USER=$RMQ_USER" >> $GITHUB_ENV
          echo "RMQ_PASS=$RMQ_PASS" >> $GITHUB_ENV
          echo "Parsed broker host: $RMQ_HOST (user: $RMQ_USER)"

      - name: Verify broker TLS certificate chain
        env:
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
          RMQ_HOST: ${{ env.RMQ_HOST }}
        run: |
          echo "$RABBITMQ_CA_CERT" | base64 -d > /tmp/rabbitmq-ca.crt
          echo "CA subject:"
          openssl x509 -in /tmp/rabbitmq-ca.crt -noout -subject -issuer -ext basicConstraints
          echo ""
          echo "Leaf cert from broker:5671 (verifying chain + SAN against 'rabbitmq'):"
          OUTPUT=$(echo | openssl s_client \
            -connect "${RMQ_HOST}:5671" \
            -servername rabbitmq \
            -verify_hostname rabbitmq \
            -CAfile /tmp/rabbitmq-ca.crt 2>&1 </dev/null)
          echo "$OUTPUT" | grep -E "subject=|issuer=|Verify return code|Verification"
          if echo "$OUTPUT" | grep -q "Verify return code: 0 (ok)"; then
            echo "✓ TLS chain + SAN verified against CA"
          else
            echo "✗ TLS chain verification failed"
            echo "$OUTPUT" | tail -20
            exit 1
          fi

      - name: Management UI reachable + authenticated
        env:
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
          RMQ_HOST: ${{ env.RMQ_HOST }}
          RMQ_USER: ${{ env.RMQ_USER }}
          RMQ_PASS: ${{ env.RMQ_PASS }}
        run: |
          echo "$RABBITMQ_CA_CERT" | base64 -d > /tmp/rabbitmq-ca.crt
          STATUS=$(curl -s -o /tmp/mgmt.json -w '%{http_code}' --max-time 10 \
            --cacert /tmp/rabbitmq-ca.crt \
            --resolve "rabbitmq:15671:${RMQ_HOST}" \
            -u "${RMQ_USER}:${RMQ_PASS}" \
            "https://rabbitmq:15671/api/overview")
          echo "Management /api/overview status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "✗ Management UI check failed"
            cat /tmp/mgmt.json
            exit 1
          fi
          NODE=$(grep -o '"node":"[^"]*"' /tmp/mgmt.json | head -1)
          VERSION=$(grep -o '"rabbitmq_version":"[^"]*"' /tmp/mgmt.json | head -1)
          echo "✓ Management UI reachable ($NODE, $VERSION)"

      - name: AMQPS connect + assert EMAIL queue
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
        run: |
          cat > "$GITHUB_WORKSPACE/queue-check.mjs" <<'EOF'
          import amqplib from 'amqplib';

          const URL = process.env.RABBITMQ_CONNECTION_STRING;
          const CA_B64 = process.env.RABBITMQ_CA_CERT;
          const QUEUE = 'EMAIL';

          const opts = CA_B64
            ? { ca: [Buffer.from(CA_B64, 'base64')], checkServerIdentity: () => undefined }
            : undefined;

          try {
            const conn = await amqplib.connect(URL, opts);
            const ch = await conn.createChannel();
            const q = await ch.checkQueue(QUEUE);
            console.log(`PASS: queue ${QUEUE} present (messages=${q.messageCount}, consumers=${q.consumerCount})`);
            await ch.close();
            await conn.close();
          } catch (err) {
            console.error('FAIL:', err.message);
            process.exit(1);
          }
          EOF
          node "$GITHUB_WORKSPACE/queue-check.mjs"

      - name: Publish + consume round-trip
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
        run: |
          cat > "$GITHUB_WORKSPACE/round-trip.mjs" <<'EOF'
          import amqplib from 'amqplib';

          const URL = process.env.RABBITMQ_CONNECTION_STRING;
          const CA_B64 = process.env.RABBITMQ_CA_CERT;
          const QUEUE = `ci-e2e-${Date.now()}`;
          const PAYLOAD = { hello: 'from-ci', ts: Date.now() };
          const TIMEOUT_MS = 10000;

          const opts = CA_B64
            ? { ca: [Buffer.from(CA_B64, 'base64')], checkServerIdentity: () => undefined }
            : undefined;

          const conn = await amqplib.connect(URL, opts);
          const ch = await conn.createChannel();
          await ch.assertQueue(QUEUE, { durable: false, autoDelete: true, exclusive: true });

          try {
            const received = new Promise((resolve, reject) => {
              const timer = setTimeout(() => reject(new Error('timeout waiting for message')), TIMEOUT_MS);
              ch.consume(QUEUE, (msg) => {
                if (!msg) return;
                clearTimeout(timer);
                resolve(JSON.parse(msg.content.toString()));
              }, { noAck: true });
            });

            ch.sendToQueue(QUEUE, Buffer.from(JSON.stringify(PAYLOAD)));
            const got = await received;
            const gotStr = JSON.stringify(got);
            const wantStr = JSON.stringify(PAYLOAD);
            if (gotStr !== wantStr) {
              console.error(`FAIL: payload mismatch.\n  got:  ${gotStr}\n  want: ${wantStr}`);
              process.exit(1);
            }
            console.log('PASS: round-trip delivered');
          } catch (err) {
            console.error('FAIL:', err.message);
            process.exit(1);
          } finally {
            await ch.close();
            await conn.close();
          }
          EOF
          node "$GITHUB_WORKSPACE/round-trip.mjs"
