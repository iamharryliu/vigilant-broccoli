name: test-e2e-llm

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        type: choice
        default: all
        options:
          - all
          - staging
          - production
  workflow_run:
    workflows: ["deploy", "ci-rotate-secrets"]
    types: [completed]
    branches: [main, production]

permissions:
  contents: read
  id-token: write

jobs:
  test-llm-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(github.event_name == 'workflow_run' && format('["{0}"]', github.event.workflow_run.head_branch == 'production' && 'production' || 'staging') || inputs.environment && inputs.environment != 'all' && format('["{0}"]', inputs.environment) || '["staging", "production"]') }}
        provider: [openai, anthropic, gemini, deepseek, grok]
        include:
          - provider: openai
            model: gpt-4o-mini
          - provider: anthropic
            model: claude-haiku-4-5-20251001
          - provider: gemini
            model: gemini-2.5-flash-lite
          - provider: deepseek
            model: deepseek-chat
          - provider: grok
            model: grok-3-mini
    name: ${{ matrix.environment }} ${{ matrix.provider }}
    env:
      LLM_SERVICE_URL: https://${{ matrix.environment }}-vb-llm-service.fly.dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;

      - name: Run e2e tests (${{ matrix.provider }})
        env:
          LLM_SERVICE_URL: ${{ env.LLM_SERVICE_URL }}
          SHARED_APP_TOKEN: ${{ env.SHARED_APP_TOKEN }}
          MODEL: ${{ matrix.model }}
        run: |
          chmod +x scripts/shell/test-llm-e2e.sh
          scripts/shell/test-llm-e2e.sh
