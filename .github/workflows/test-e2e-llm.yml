name: test-e2e-llm

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy", "rotate-secrets"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  LLM_SERVICE_URL: https://vb-llm-service.fly.dev

jobs:
  test-llm-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: openai
            model: gpt-4o-mini
          - provider: anthropic
            model: claude-haiku-4-5-20251001
          - provider: gemini
            model: gemini-2.5-flash-lite
          - provider: deepseek
            model: deepseek-chat
          - provider: grok
            model: grok-3-mini
    name: ${{ matrix.provider }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          wg_private_key: ${{ secrets.VB_GHA_WG_PRIVATE_KEY }}
          wg_endpoint: ${{ vars.VAULT_VM_WG_ENDPOINT }}
          wg_server_public_key: ${{ secrets.VB_VM_WG_SERVER_PUBLIC_KEY }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;

      - name: Run e2e tests (${{ matrix.provider }})
        env:
          LLM_SERVICE_URL: ${{ env.LLM_SERVICE_URL }}
          SHARED_APP_TOKEN: ${{ env.SHARED_APP_TOKEN }}
          MODEL: ${{ matrix.model }}
        run: |
          chmod +x scripts/shell/test-llm-e2e.sh
          scripts/shell/test-llm-e2e.sh
