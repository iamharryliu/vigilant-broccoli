name: test-e2e-gcp-secret-manager

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-gcp-secret-manager-access:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Import Secret from Google Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@2b5f97c5a4b9c105e64646762ad4fc3f5128e6f5 # v2
        with:
          secrets: |-
            TEST_SECRET:vigilant-broccoli/TEST_SECRET

      - name: Verify Secret Value
        env:
          TEST_SECRET: ${{ steps.secrets.outputs.TEST_SECRET }}
        run: |
          if [ -z "$TEST_SECRET" ]; then
            echo "ERROR: TEST_SECRET is empty or not set"
            exit 1
          fi

          echo "TEST_SECRET retrieved (length: ${#TEST_SECRET})"

          if [ "$TEST_SECRET" = "hello world" ]; then
            echo "TEST_SECRET value matches expected 'hello world'"
          else
            echo "ERROR: TEST_SECRET value does not match expected 'hello world'"
            exit 1
          fi
