name: health-check
on:
  workflow_dispatch:
  schedule: [{ cron: '0 0,12 * * *' }]
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/health-check.yml'
      - '.github/workflows/deploy.yml'
      - 'projects/nx-workspace/scripts/fetch-secrets.ts'
      - 'projects/nx-workspace/scripts/vault-ca.crt'
      - 'projects/nx-workspace/libs/@vigilant-broccoli/scripts/health-check.ts'

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  main:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify GCP Secret Manager Access
        id: gcp-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            TEST_SECRET:vigilant-broccoli/TEST_SECRET

      - name: Verify GCP Secret Value
        env:
          TEST_SECRET: ${{ steps.gcp-secrets.outputs.TEST_SECRET }}
        run: |
          if [ "$TEST_SECRET" = "hello world" ]; then
            echo "GCP Secret Manager access verified"
          else
            echo "ERROR: TEST_SECRET value does not match expected 'hello world'"
            exit 1
          fi

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh vb-free-vm \
            --zone=us-east1-b \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &

          SSH_PID=$!
          echo "SSH_PID=$SSH_PID" >> $GITHUB_ENV

          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              curl -k -s https://127.0.0.1:8200/v1/sys/health | jq .
              break
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: github-actions-role
          jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
          secrets: |
            kv/data/test test | TEST_SECRET ;
            kv/data/secrets RESEND_API_KEY | RESEND_API_KEY ;

      - name: Verify Vault Access
        run: |
          if [ -n "$TEST_SECRET" ]; then
            echo "Vault access verified (TEST_SECRET set)"
          else
            echo "ERROR: TEST_SECRET is empty or not set"
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./projects/nx-workspace/package-lock.json

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p "require('./package-lock.json').packages['node_modules/rollup'].optionalDependencies['@rollup/rollup-linux-x64-gnu']")

      - name: Install nx globally
        run: npm install -g nx

      - name: Run health check
        working-directory: ./projects/nx-workspace
        env:
          RESEND_API_KEY: ${{ env.RESEND_API_KEY }}
        run: npm install @vigilant-broccoli/common-js && npx nx run @vigilant-broccoli/scripts:run-script:health-check
