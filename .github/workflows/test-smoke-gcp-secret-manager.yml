name: test-smoke-gcp-secret-manager

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-gcp-secret-manager-access:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Import Secret from Google Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3
        with:
          secrets: |-
            TEST_SECRET:vigilant-broccoli/TEST_SECRET

      - name: Verify Secret Value
        env:
          TEST_SECRET: ${{ steps.secrets.outputs.TEST_SECRET }}
        run: |
          if [ -z "$TEST_SECRET" ]; then
            echo "ERROR: TEST_SECRET is empty or not set"
            exit 1
          fi

          echo "TEST_SECRET retrieved (length: ${#TEST_SECRET})"

          if [ "$TEST_SECRET" = "hello world" ]; then
            echo "TEST_SECRET value matches expected 'hello world'"
          else
            echo "ERROR: TEST_SECRET value does not match expected 'hello world'"
            exit 1
          fi
