name: cron-upptime

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [uptime]

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: upptime
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets GITHUB_TOKEN | GITHUB_TOKEN ;
      - name: Point origin at the admin PAT for push
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
      - name: Warm fly.io services
        continue-on-error: true
        run: |
          urls=(
            https://staging-vb-llm-service.fly.dev/
            https://staging-vb-storage-service.fly.dev/
            https://staging-vb-email-service.fly.dev/
            https://staging-email-subscription-service.fly.dev/
            https://staging-vb-express.fly.dev/
            https://production-vb-llm-service.fly.dev/
            https://production-vb-storage-service.fly.dev/
            https://production-vb-email-service.fly.dev/
            https://production-email-subscription-service.fly.dev/
            https://production-vb-express.fly.dev/
          )
          for url in "${urls[@]}"; do
            curl -s -o /dev/null --max-time 30 "$url" &
          done
          wait
          sleep 3
      - uses: upptime/uptime-monitor@65aad8bba77c40ec051f30e7329563f7f4cfab6e # v1.43.9
        env:
          GH_PAT: ${{ env.GITHUB_TOKEN }}
