name: test-security-api

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy", "ci-rotate-secrets"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  security-check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: staging-vb-express
            url: https://staging-vb-express.fly.dev
          - name: staging-vb-llm-service
            url: https://staging-vb-llm-service.fly.dev
          - name: staging-vb-storage-service
            url: https://staging-vb-storage-service.fly.dev
          - name: staging-vb-email-service
            url: https://staging-vb-email-service.fly.dev
          - name: staging-email-subscription-service
            url: https://staging-email-subscription-service.fly.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run security check for ${{ matrix.name }}
        run: |
          chmod +x scripts/shell/test-api-ping-security.sh
          scripts/shell/test-api-ping-security.sh "${{ matrix.name }}" "${{ matrix.url }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Security check failed for ${{ matrix.name }}! /api/* may be accepting unauthorized requests."
          exit 1
