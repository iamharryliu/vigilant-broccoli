name: test-email-service

on:
  push:
    paths:
      - .github/workflows/test-email-service.yml
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  test-email-service:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh vb-free-vm \
            --zone=us-east1-b \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              break
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: github-actions-role
          jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
          secrets: |
            kv/data/secrets EMAIL_SERVICE_API_KEY | EMAIL_SERVICE_API_KEY ;

      - name: Test email service
        env:
          EMAIL_SERVICE_API_KEY: ${{ env.EMAIL_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST https://vb-email-service.fly.dev/send-email \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${EMAIL_SERVICE_API_KEY}" \
            -d '{"from":"Harry Liu <contact@harryliu.dev>","to":"harryliu1995@gmail.com","subject":"[CI] Email Service Test","html":"<p>Automated test from GitHub Actions.</p>"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Email service test passed"
          else
            echo "✗ Email service test failed"
            exit 1
          fi
