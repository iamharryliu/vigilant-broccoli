name: cron-utility-backup-repos

on:
  push:
    paths:
      - .github/workflows/cron-utility-backup-repos.yml
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  backup-vb-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Upload backup to GCS
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          curl -sL -o vigilant-broccoli.zip https://github.com/iamharryliu/vigilant-broccoli/archive/refs/heads/main.zip
          gsutil cp vigilant-broccoli.zip gs://vigilant-broccoli-backup/repo-backup-$TIMESTAMP.zip

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/repo-backup-*.zip | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi

  backup-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets GITEA_TOKEN | GITEA_TOKEN ;

      - name: Upload backup to GCS
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          curl -sL -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -o journal.zip \
            https://git.harryliu.dev/api/v1/repos/iamharryliu/journal/archive/main.zip
          gsutil cp journal.zip gs://vigilant-broccoli-backup/journal-backup-$TIMESTAMP.zip

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/journal-backup-*.zip | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi

  backup-strandbaden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets GITEA_TOKEN | GITEA_TOKEN ;

      - name: Upload backup to GCS
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          curl -sL -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -o strandbaden.zip \
            https://git.harryliu.dev/api/v1/repos/iamharryliu/strandbaden/archive/main.zip
          gsutil cp strandbaden.zip gs://vigilant-broccoli-backup/strandbaden-backup-$TIMESTAMP.zip

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/strandbaden-backup-*.zip | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi
