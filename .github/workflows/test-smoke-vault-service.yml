name: test-smoke-vault-service

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-vault-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/test test | TEST_SECRET ;

      - name: Verify Secret Retrieved
        run: |
          echo "Secret retrieved successfully"
          if [ -n "$TEST_SECRET" ]; then
            echo "TEST_SECRET is set (length: ${#TEST_SECRET})"
          else
            echo "ERROR: TEST_SECRET is empty or not set"
            exit 1
          fi
