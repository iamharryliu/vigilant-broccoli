name: test-smoke-vault-service

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-vault-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          cf_access_client_id: ${{ secrets.VAULT_CF_ACCESS_CLIENT_ID }}
          cf_access_client_secret: ${{ secrets.VAULT_CF_ACCESS_CLIENT_SECRET }}
          secrets: |
            kv/data/test test | TEST_SECRET ;

      - name: Verify Secret Retrieved
        run: |
          echo "Secret retrieved successfully"
          if [ -n "$TEST_SECRET" ]; then
            echo "TEST_SECRET is set (length: ${#TEST_SECRET})"
          else
            echo "ERROR: TEST_SECRET is empty or not set"
            exit 1
          fi
