name: ci-health-check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ['deploy']
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read
  id-token: write

env:
  GCP_PROJECT: vigilant-broccoli
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm

jobs:
  health-check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets RABBITMQ_CONNECTION_STRING | RABBITMQ_CONNECTION_STRING ;
            kv/data/secrets RABBITMQ_CA_CERT | RABBITMQ_CA_CERT ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;
            kv/data/secrets GITEA_CF_ACCESS_CLIENT_ID | GITEA_CF_ACCESS_CLIENT_ID ;
            kv/data/secrets GITEA_CF_ACCESS_CLIENT_SECRET | GITEA_CF_ACCESS_CLIENT_SECRET ;
            kv/data/secrets CODE_SERVER_CF_ACCESS_CLIENT_ID | CODE_SERVER_CF_ACCESS_CLIENT_ID ;
            kv/data/secrets CODE_SERVER_CF_ACCESS_CLIENT_SECRET | CODE_SERVER_CF_ACCESS_CLIENT_SECRET ;
            kv/data/secrets JOURNAL_CF_ACCESS_CLIENT_ID | JOURNAL_CF_ACCESS_CLIENT_ID ;
            kv/data/secrets JOURNAL_CF_ACCESS_CLIENT_SECRET | JOURNAL_CF_ACCESS_CLIENT_SECRET ;

      - name: Fetch Cloudflare Access service token from Secret Manager
        id: cf-access
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3
        with:
          secrets: |-
            CF_ACCESS_CLIENT_ID:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_ID
            CF_ACCESS_CLIENT_SECRET:vigilant-broccoli/VAULT_CF_ACCESS_CLIENT_SECRET

      - name: Run health checks
        env:
          RABBITMQ_CONNECTION_STRING: ${{ env.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_CA_CERT: ${{ env.RABBITMQ_CA_CERT }}
          SOCKET_SERVER_URL: ${{ env.SOCKET_SERVER_URL }}
          CF_ACCESS_CLIENT_ID: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ steps.cf-access.outputs.CF_ACCESS_CLIENT_SECRET }}
          GITEA_CF_ACCESS_CLIENT_ID: ${{ env.GITEA_CF_ACCESS_CLIENT_ID }}
          GITEA_CF_ACCESS_CLIENT_SECRET: ${{ env.GITEA_CF_ACCESS_CLIENT_SECRET }}
          CODE_SERVER_CF_ACCESS_CLIENT_ID: ${{ env.CODE_SERVER_CF_ACCESS_CLIENT_ID }}
          CODE_SERVER_CF_ACCESS_CLIENT_SECRET: ${{ env.CODE_SERVER_CF_ACCESS_CLIENT_SECRET }}
          JOURNAL_CF_ACCESS_CLIENT_ID: ${{ env.JOURNAL_CF_ACCESS_CLIENT_ID }}
          JOURNAL_CF_ACCESS_CLIENT_SECRET: ${{ env.JOURNAL_CF_ACCESS_CLIENT_SECRET }}
        run: |
          PASS=0
          FAIL=0

          check() {
            local name="$1"
            local status="$2"
            if [ "$status" = "ok" ]; then
              echo "  ✓ $name"
              PASS=$((PASS + 1))
            else
              echo "  ✗ $name — $status"
              FAIL=$((FAIL + 1))
            fi
          }

          http_check() {
            local name="$1"
            local url="$2"
            local expected="${3:-200}"
            local code
            # Retry to tolerate scale-to-zero cold starts (first request wakes the service).
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" 2>/dev/null) || code="timeout"
              [ "$code" = "$expected" ] && break
              [ "$attempt" -lt 3 ] && sleep 5
            done
            if [ "$code" = "$expected" ]; then
              check "$name" "ok"
            else
              check "$name" "HTTP $code (expected $expected)"
            fi
          }

          echo "=== Infrastructure Health Check ==="
          echo ""

          echo "[Fly.io Apps]"
          http_check "staging-vb-express" "https://staging-vb-express.fly.dev"
          http_check "staging-vb-email-service" "https://staging-vb-email-service.fly.dev"
          http_check "staging-vb-llm-service" "https://staging-vb-llm-service.fly.dev"
          http_check "staging-vb-storage-service" "https://staging-vb-storage-service.fly.dev"
          http_check "staging-email-subscription-service" "https://staging-email-subscription-service.fly.dev"

          echo ""
          echo "[Websites]"
          http_check "harryliu.dev" "https://harryliu.dev"
          http_check "cloud8skate.com" "https://cloud8skate.com"
          http_check "staging-hearth.vercel.app" "https://staging-hearth.vercel.app"
          http_check "findme" "https://staging-findme.vercel.app"

          echo ""
          echo "[GCP VM]"
          VM_STATUS=$(gcloud compute instances describe ${{ env.VM_NAME }} --zone=${{ env.GCP_ZONE }} --format='value(status)' 2>/dev/null) || VM_STATUS="unknown"
          if [ "$VM_STATUS" = "RUNNING" ]; then
            check "${{ env.VM_NAME }}" "ok"
          else
            check "${{ env.VM_NAME }}" "$VM_STATUS"
          fi

          echo ""
          echo "[GCP VM — Vault]"
          HEALTH=$(curl -s \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            https://vault.harryliu.dev/v1/sys/health) || HEALTH=""
          if [ -n "$HEALTH" ]; then
            SEALED=$(echo "$HEALTH" | jq -r '.sealed')
            INITIALIZED=$(echo "$HEALTH" | jq -r '.initialized')
            if [ "$SEALED" = "false" ] && [ "$INITIALIZED" = "true" ]; then
              check "vault" "ok"
            elif [ "$SEALED" = "true" ]; then
              check "vault" "sealed"
            else
              check "vault" "initialized=$INITIALIZED sealed=$SEALED"
            fi
          else
            check "vault" "unreachable"
          fi

          echo ""
          echo "[OCI VM — Gitea (behind Cloudflare Access)]"
          # Authenticated probe: a 200 means the CF Access service token still
          # works AND Gitea is up. A 302 to the Access login = expired/rejected
          # token; anything else = Gitea down. Uses the API healthz endpoint,
          # which the gitea-ci non_identity policy is allowed to reach.
          GITEA_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 \
            -H "CF-Access-Client-Id: ${GITEA_CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${GITEA_CF_ACCESS_CLIENT_SECRET}" \
            "https://git.harryliu.dev/api/healthz" 2>/dev/null) || GITEA_CODE="timeout"
          if [ "$GITEA_CODE" = "200" ]; then
            check "gitea" "ok"
          elif [ "$GITEA_CODE" = "302" ]; then
            check "gitea" "CF Access token rejected/expired (HTTP 302 to login)"
          else
            check "gitea" "HTTP $GITEA_CODE (expected 200)"
          fi

          echo ""
          echo "[OCI VM — code-server (behind Cloudflare Access)]"
          # Authenticated probe of the code-server origin. An unauthenticated
          # request only ever reaches the Access login (200 from the edge), so
          # it can't tell a dead VM from a live one — the service token headers
          # get Access to forward the request to the origin. /healthz is
          # code-server's built-in health endpoint (200 when up). A 302 to login
          # means the token was rejected/expired; anything else = origin down.
          CODE_SERVER_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 \
            -H "CF-Access-Client-Id: ${CODE_SERVER_CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CODE_SERVER_CF_ACCESS_CLIENT_SECRET}" \
            "https://code.harryliu.dev/healthz" 2>/dev/null) || CODE_SERVER_CODE="timeout"
          if [ "$CODE_SERVER_CODE" = "200" ]; then
            check "code-server" "ok"
          elif [ "$CODE_SERVER_CODE" = "302" ]; then
            check "code-server" "CF Access token rejected/expired (HTTP 302 to login)"
          else
            check "code-server" "HTTP $CODE_SERVER_CODE (expected 200)"
          fi

          echo ""
          echo "[Cloudflare Pages — journal (behind Cloudflare Access)]"
          # Same rationale as code-server: unauthenticated only sees the Access
          # login, so probe the origin with the service token. A 200 means the
          # token works AND the Pages deploy is serving; 302 = token rejected;
          # anything else = deploy broken/missing.
          JOURNAL_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 \
            -H "CF-Access-Client-Id: ${JOURNAL_CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${JOURNAL_CF_ACCESS_CLIENT_SECRET}" \
            "https://journal.harryliu.dev/" 2>/dev/null) || JOURNAL_CODE="timeout"
          if [ "$JOURNAL_CODE" = "200" ]; then
            check "journal" "ok"
          elif [ "$JOURNAL_CODE" = "302" ]; then
            check "journal" "CF Access token rejected/expired (HTTP 302 to login)"
          else
            check "journal" "HTTP $JOURNAL_CODE (expected 200)"
          fi

          echo ""
          echo "[OCI VM — RabbitMQ Management]"
          PROTO_STRIPPED="${RABBITMQ_CONNECTION_STRING#amqps://}"
          USER_PASS="${PROTO_STRIPPED%@*}"
          HOST_PORT="${PROTO_STRIPPED##*@}"
          RMQ_USER="${USER_PASS%%:*}"
          RMQ_PASS="${USER_PASS#*:}"
          RMQ_HOST="${HOST_PORT%%:*}"
          RMQ_IP=$(dig +short "$RMQ_HOST" | head -1)
          echo "::add-mask::$RMQ_PASS"
          echo "$RABBITMQ_CA_CERT" | base64 -d > /tmp/rabbitmq-ca.crt
          RMQ_CODE=$(curl -s -o /tmp/mgmt.json -w '%{http_code}' --max-time 15 \
            --cacert /tmp/rabbitmq-ca.crt \
            --resolve "rabbitmq:15671:${RMQ_IP}" \
            -u "${RMQ_USER}:${RMQ_PASS}" \
            "https://rabbitmq:15671/api/overview" 2>/dev/null) || RMQ_CODE="timeout"
          if [ "$RMQ_CODE" = "200" ]; then
            VERSION=$(grep -o '"rabbitmq_version":"[^"]*"' /tmp/mgmt.json | cut -d'"' -f4)
            check "rabbitmq broker (version: $VERSION)" "ok"
          else
            check "rabbitmq broker" "HTTP $RMQ_CODE (expected 200)"
          fi

          echo ""
          echo "[OCI VM — Socket Server]"
          SOCKET_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "${SOCKET_SERVER_URL}/health" 2>/dev/null) || SOCKET_CODE="timeout"
          if [ "$SOCKET_CODE" = "200" ]; then
            check "socket-server-socketio" "ok"
          else
            check "socket-server-socketio" "HTTP $SOCKET_CODE (expected 200)"
          fi

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="
          [ "$FAIL" -eq 0 ] || exit 1
