name: test-e2e-socket-server-socketio

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_run:
    workflows: ['deploy', 'ci-rotate-secrets']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test-socket-server:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install socket.io-client
        run: npm install --no-save socket.io-client@4

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;

      - name: Health check
        run: |
          STATUS=$(curl -sk -o /tmp/health.json -w '%{http_code}' --max-time 10 "${SOCKET_SERVER_URL}/health")
          echo "Health status: $STATUS"
          cat /tmp/health.json
          if [ "$STATUS" != "200" ]; then
            echo "✗ Health check failed"
            exit 1
          fi
        env:
          SOCKET_SERVER_URL: ${{ env.SOCKET_SERVER_URL }}

      - name: Socket round-trip test
        env:
          SOCKET_SERVER_URL: ${{ env.SOCKET_SERVER_URL }}
          SHARED_APP_TOKEN: ${{ env.SHARED_APP_TOKEN }}
        run: |
          cat > "$GITHUB_WORKSPACE/round-trip.mjs" <<'EOF'
          import { io } from 'socket.io-client';

          const URL = process.env.SOCKET_SERVER_URL;
          const TOKEN = process.env.SHARED_APP_TOKEN;
          const APP = 'ci';
          const RECEIVER_ID = `ci-${Date.now()}`;
          const EXPECTED = { hello: 'from-ci', ts: Date.now() };
          const TIMEOUT_MS = 10000;

          const sender = io(URL, { auth: { token: TOKEN }, transports: ['websocket'] });
          const receiver = io(URL, { transports: ['websocket'] });

          const awaitEvent = (s, event) =>
            new Promise((resolve, reject) => {
              const t = setTimeout(() => reject(new Error(`timeout waiting for ${event}`)), TIMEOUT_MS);
              s.once(event, (...args) => { clearTimeout(t); resolve(args); });
            });

          const emitWithAck = (s, event, data) =>
            new Promise((resolve, reject) => {
              const t = setTimeout(() => reject(new Error(`timeout waiting for ack:${event}`)), TIMEOUT_MS);
              s.emit(event, data, (res) => { clearTimeout(t); resolve(res); });
            });

          try {
            await Promise.all([awaitEvent(sender, 'connect'), awaitEvent(receiver, 'connect')]);
            const messagePromise = awaitEvent(receiver, 'message');
            receiver.emit('subscribe', { app: APP, receiverId: RECEIVER_ID });
            await new Promise((r) => setTimeout(r, 300));
            const ack = await emitWithAck(sender, 'publish', { app: APP, receiverId: RECEIVER_ID, payload: EXPECTED });
            if (!ack?.ok) {
              console.error(`FAIL: publish rejected (code=${ack?.code})`);
              process.exit(1);
            }
            const [msg] = await messagePromise;
            const got = JSON.stringify(msg.payload);
            const want = JSON.stringify(EXPECTED);
            if (got !== want) {
              console.error(`FAIL: payload mismatch.\n  got:  ${got}\n  want: ${want}`);
              process.exit(1);
            }
            console.log('PASS: round-trip delivered');
          } catch (err) {
            console.error('FAIL:', err.message);
            process.exit(1);
          } finally {
            sender.close();
            receiver.close();
          }
          EOF
          node "$GITHUB_WORKSPACE/round-trip.mjs"
