name: deploy-github-profile

on:
  push:
    branches: ['main']
    paths:
      - 'projects/github-profile/**'
      - '.github/workflows/deploy-github-profile.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROFILE_REPO: git@github.com:iamharryliu/iamharryliu.git

jobs:
  sync-profile-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets PROFILE_REPO_DEPLOY_KEY | PROFILE_REPO_DEPLOY_KEY ;

      - name: Push README to profile repo
        env:
          DEPLOY_KEY: ${{ env.PROFILE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone "$PROFILE_REPO" profile-repo
          cp projects/github-profile/README.md profile-repo/README.md
          cd profile-repo
          if git diff --quiet; then
            echo "README unchanged, nothing to sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "docs: sync profile README from vigilant-broccoli"
          git push
