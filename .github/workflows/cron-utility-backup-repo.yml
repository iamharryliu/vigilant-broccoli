name: cron-utility-backup-repo

on:
  push:
    paths:
      - .github/workflows/cron-utility-backup-repo.yml
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  backup-vb-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Upload backup to GCS
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          curl -sL -o vigilant-broccoli.zip https://github.com/iamharryliu/vigilant-broccoli/archive/refs/heads/main.zip
          gsutil cp vigilant-broccoli.zip gs://vigilant-broccoli-backup/vigilant-broccoli-backup-$TIMESTAMP.zip
