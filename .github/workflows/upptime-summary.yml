name: upptime-summary

# Writes README badges and history/summary.json — the latter is what
# pages-index/status.html fetches on page load.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [summary]

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/status-page@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: 'summary'
