name: kill-services

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "kill" to confirm'
        required: true

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  kill:
    if: ${{ github.event.inputs.confirm == 'kill' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh vb-free-vm \
            --zone=us-east1-b \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &

          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: github-actions-role
          jwtGithubAudience: https://github.com/iamharryliu/vigilant-broccoli
          secrets: |
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy Fly app machines
        run: |
          for app in vb-express vb-email-service vb-manager-next-mobile; do
            echo "Destroying machines for $app..."
            flyctl machine list --app $app --json \
              | jq -r '.[].id' \
              | xargs -I {} flyctl machine destroy {} --app $app --force
            echo "✓ $app machines destroyed"
          done
