name: notify-complete

on:
  workflow_run:
    workflows: ['deploy', 'rotate-secrets']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          wg_private_key: ${{ secrets.VB_GHA_WG_PRIVATE_KEY }}
          wg_endpoint: ${{ vars.VAULT_VM_WG_ENDPOINT }}
          wg_server_public_key: ${{ secrets.VB_VM_WG_SERVER_PUBLIC_KEY }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;

      - name: Notify deploy complete
        uses: ./.github/actions/deploy-notify
        with:
          status: ${{ (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'skipped') && 'success' || 'failure' }}
          job: deploy
          socket_server_url: ${{ env.SOCKET_SERVER_URL }}
          shared_app_token: ${{ env.SHARED_APP_TOKEN }}
          started_at: ${{ github.event.workflow_run.run_started_at }}
          run_url: ${{ github.event.workflow_run.html_url }}
