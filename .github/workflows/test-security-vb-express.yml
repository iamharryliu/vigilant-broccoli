name: test-security-vb-express

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]
    branches: [main]

jobs:
  security-check:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run security check
        run: |
          chmod +x scripts/shell/test-vb-express-security.sh
          scripts/shell/test-vb-express-security.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "Security check failed! The /llm endpoint may be accepting unauthorized requests."
          exit 1
