name: deploy-npm-packages
on:
  push:
    branches: ['main']
    paths:
      - 'projects/nx-workspace/libs/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./projects/nx-workspace/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: npm ci

      - name: Get affected projects
        id: affected
        working-directory: ./projects/nx-workspace
        run: |
          AFFECTED=$(npx nx show projects --affected --type=lib --base=HEAD~1 --head=HEAD 2>/dev/null | tr -d '[]"' | tr ',' ' ')
          echo "projects=$AFFECTED" >> $GITHUB_OUTPUT

      - name: Publish affected
        if: steps.affected.outputs.projects != ''
        working-directory: ./projects/nx-workspace
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npx nx run-many -t publish-package --projects=${{ steps.affected.outputs.projects }}
