name: manual-kill-services

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "kill" to confirm'
        required: true

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  kill:
    if: ${{ github.event.inputs.confirm == 'kill' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Destroy Fly app machines
        run: |
          for app in staging-vb-express staging-vb-email-service staging-vb-manager-next-mobile; do
            echo "Destroying machines for $app..."
            flyctl machine list --app $app --json \
              | jq -r '.[].id' \
              | xargs -I {} flyctl machine destroy {} --app $app --force
            echo "✓ $app machines destroyed"
          done
