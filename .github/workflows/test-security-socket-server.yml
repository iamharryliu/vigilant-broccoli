name: test-security-socket-server

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ['deploy', 'rotate-secrets']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  security-check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install socket.io-client
        run: npm install --no-save socket.io-client@4

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SOCKET_SERVER_URL | SOCKET_SERVER_URL ;
            kv/data/secrets SOCKET_SERVER_CA_CERT | SOCKET_SERVER_CA_CERT ;

      - name: Run security checks
        env:
          SOCKET_SERVER_URL: ${{ env.SOCKET_SERVER_URL }}
          SOCKET_SERVER_CA_CERT: ${{ env.SOCKET_SERVER_CA_CERT }}
        run: node scripts/node/test-socket-server-security.mjs

      - name: Notify on failure
        if: failure()
        run: |
          echo "Security check failed! The socket-server may be allowing unauthorized publishes."
          exit 1
