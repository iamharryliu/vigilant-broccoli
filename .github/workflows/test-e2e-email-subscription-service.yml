name: test-e2e-email-subscription-service

on:
  push:
    paths:
      - .github/workflows/test-e2e-email-subscription-service.yml
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm
  VAULT_ROLE: github-actions-role
  VAULT_AUDIENCE: https://github.com/iamharryliu/vigilant-broccoli
  SERVICE_URL: https://email-subscription-service.fly.dev
  TEST_EMAIL: harryliu1995@gmail.com
  TEST_SUBSCRIPTION: ci-test

jobs:
  test-email-subscription-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          secrets: |
            kv/data/secrets EMAIL_SUBSCRIPTION_SERVICE_API_KEY | EMAIL_SUBSCRIPTION_SERVICE_API_KEY ;

      - name: Test subscribe
        env:
          API_KEY: ${{ env.EMAIL_SUBSCRIPTION_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/subscribe \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"email":"${{ env.TEST_EMAIL }}","subscriptionName":"${{ env.TEST_SUBSCRIPTION }}"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Subscribe passed"
          else
            echo "✗ Subscribe failed"
            exit 1
          fi

      - name: Test notify (subscriber should receive email)
        env:
          API_KEY: ${{ env.EMAIL_SUBSCRIPTION_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/notify \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"subscriptionName":"${{ env.TEST_SUBSCRIPTION }}","message":"<p>[CI] Test notification — you are subscribed.</p>"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          QUEUED=$(cat /tmp/response.json | grep -o '"queued":[0-9]*' | cut -d: -f2)
          if [ "$STATUS" = "200" ] && [ "${QUEUED:-0}" -ge "1" ]; then
            echo "✓ Notify passed (queued: $QUEUED)"
          else
            echo "✗ Notify failed"
            exit 1
          fi

      - name: Test unsubscribe
        env:
          API_KEY: ${{ env.EMAIL_SUBSCRIPTION_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/unsubscribe \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"email":"${{ env.TEST_EMAIL }}","subscriptionName":"${{ env.TEST_SUBSCRIPTION }}"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Unsubscribe passed"
          else
            echo "✗ Unsubscribe failed"
            exit 1
          fi

      - name: Test notify after unsubscribe (should queue 0 emails)
        env:
          API_KEY: ${{ env.EMAIL_SUBSCRIPTION_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/notify \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"subscriptionName":"${{ env.TEST_SUBSCRIPTION }}","message":"<p>[CI] This should not be delivered.</p>"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          QUEUED=$(cat /tmp/response.json | grep -o '"queued":[0-9]*' | cut -d: -f2)
          if [ "$STATUS" = "200" ] && [ "${QUEUED:-1}" -eq "0" ]; then
            echo "✓ Post-unsubscribe notify passed (queued: 0)"
          else
            echo "✗ Post-unsubscribe notify failed (expected queued=0, got: $QUEUED)"
            exit 1
          fi
