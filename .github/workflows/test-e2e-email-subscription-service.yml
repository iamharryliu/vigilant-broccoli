name: test-e2e-email-subscription-service

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        type: choice
        default: all
        options:
          - all
          - staging
          - production
  workflow_run:
    workflows: ["deploy", "ci-rotate-secrets"]
    types: [completed]
    branches: [main, production]

permissions:
  contents: read
  id-token: write

env:
  TEST_EMAIL: harryliu1995@gmail.com
  TEST_SUBSCRIPTION: ci-test

jobs:
  test-email-subscription-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(github.event_name == 'workflow_run' && format('["{0}"]', github.event.workflow_run.head_branch == 'production' && 'production' || 'staging') || inputs.environment && inputs.environment != 'all' && format('["{0}"]', inputs.environment) || '["staging", "production"]') }}
    name: ${{ matrix.environment }}
    env:
      SERVICE_URL: https://${{ matrix.environment }}-email-subscription-service.fly.dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SHARED_APP_TOKEN | SHARED_APP_TOKEN ;

      - name: Test subscribe
        env:
          API_KEY: ${{ env.SHARED_APP_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/api/subscribe \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"email":"${{ env.TEST_EMAIL }}","subscriptionName":"${{ env.TEST_SUBSCRIPTION }}"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Subscribe passed"
          else
            echo "✗ Subscribe failed"
            exit 1
          fi

      - name: Test notify (subscriber should receive email)
        env:
          API_KEY: ${{ env.SHARED_APP_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/api/notify \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"subscriptionName":"${{ env.TEST_SUBSCRIPTION }}","message":"<p>[CI] Test notification — you are subscribed.</p>"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          QUEUED=$(cat /tmp/response.json | grep -o '"queued":[0-9]*' | cut -d: -f2)
          if [ "$STATUS" = "200" ] && [ "${QUEUED:-0}" -ge "1" ]; then
            echo "✓ Notify passed (queued: $QUEUED)"
          else
            echo "✗ Notify failed"
            exit 1
          fi

      - name: Test unsubscribe
        env:
          API_KEY: ${{ env.SHARED_APP_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/api/unsubscribe \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"email":"${{ env.TEST_EMAIL }}","subscriptionName":"${{ env.TEST_SUBSCRIPTION }}"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Unsubscribe passed"
          else
            echo "✗ Unsubscribe failed"
            exit 1
          fi

      - name: Test notify after unsubscribe (should queue 0 emails)
        env:
          API_KEY: ${{ env.SHARED_APP_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST ${{ env.SERVICE_URL }}/api/notify \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${API_KEY}" \
            -d '{"subscriptionName":"${{ env.TEST_SUBSCRIPTION }}","message":"<p>[CI] This should not be delivered.</p>"}')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          QUEUED=$(cat /tmp/response.json | grep -o '"queued":[0-9]*' | cut -d: -f2)
          if [ "$STATUS" = "200" ] && [ "${QUEUED:-1}" -eq "0" ]; then
            echo "✓ Post-unsubscribe notify passed (queued: 0)"
          else
            echo "✗ Post-unsubscribe notify failed (expected queued=0, got: $QUEUED)"
            exit 1
          fi
