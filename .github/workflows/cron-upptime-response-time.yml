name: cron-upptime-response-time

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [response_time]

permissions:
  contents: write
  issues: write

concurrency:
  group: upptime
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Warm fly.io services
        continue-on-error: true
        run: |
          urls=(
            https://vb-llm-service.fly.dev/
            https://vb-storage-service.fly.dev/
            https://vb-email-service.fly.dev/
            https://email-subscription-service.fly.dev/
            https://vb-express.fly.dev/
          )
          for url in "${urls[@]}"; do
            curl -s -o /dev/null --max-time 30 "$url" &
          done
          wait
          sleep 3
      - uses: upptime/uptime-monitor@1e27390f41da4d644dd921eed19fee111bdf5c88 # v1.43.8
        with:
          command: 'response-time'
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: upptime/uptime-monitor@1e27390f41da4d644dd921eed19fee111bdf5c88 # v1.43.8
        with:
          command: 'summary'
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
