name: rotate-secrets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "rotate" to confirm rotation of SHARED_APP_TOKEN and VB_EXPRESS_API_KEY'
        required: true

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

jobs:
  rotate:
    if: ${{ github.event.inputs.confirm == 'rotate' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          wg_private_key: ${{ secrets.VB_GHA_WG_PRIVATE_KEY }}
          wg_endpoint: ${{ vars.VAULT_VM_WG_ENDPOINT }}
          wg_server_public_key: ${{ secrets.VB_VM_WG_SERVER_PUBLIC_KEY }}
          role: github-actions-rotate-role
          export_token: 'true'
          secrets: |
            kv/data/test test | TEST_SECRET ;

      - name: Rotate Vault Secrets
        working-directory: ./projects/nx-workspace
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://10.0.1.1:8200
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/projects/nx-workspace/scripts/vault-ca.crt
        run: pnpm exec tsx scripts/rotate-vault-secrets.ts

  deploy:
    needs: rotate
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
