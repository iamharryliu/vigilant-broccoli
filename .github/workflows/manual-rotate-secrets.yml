name: manual-rotate-secrets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "rotate" to confirm rotation of SHARED_APP_TOKEN and VB_EXPRESS_API_KEY'
        required: true

permissions:
  actions: read
  contents: read
  id-token: write

env:
  DOCKERHUB_USERNAME: iamharryliu

jobs:
  rotate-and-deploy:
    if: ${{ github.event.inputs.confirm == 'rotate' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: ./projects/nx-workspace/package.json

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: ./projects/nx-workspace/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./projects/nx-workspace
        run: pnpm install --frozen-lockfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          role: github-actions-rotate-role
          export_token: 'true'
          secrets: |
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ACCOUNT_ID ;
            kv/data/secrets CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ID ;
            kv/data/secrets CLOUDFLARE_API_TOKEN_VB_DEPLOY_NX_APPS | CLOUDFLARE_API_TOKEN ;
            kv/data/secrets FLY_API_TOKEN | FLY_API_TOKEN ;
            kv/data/secrets DOCKERHUB_TOKEN | DOCKERHUB_TOKEN ;

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Rotate Vault Secrets
        working-directory: ./projects/nx-workspace
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://127.0.0.1:8200
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/projects/nx-workspace/scripts/vault-ca.crt
        run: pnpm exec tsx scripts/rotate-vault-secrets.ts

      - name: Deploy all apps
        working-directory: ./projects/nx-workspace
        env:
          COMMIT_SHA: ${{ github.sha }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: https://127.0.0.1:8200
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/projects/nx-workspace/scripts/vault-ca.crt
        run: pnpm exec nx run-many -t deploy
