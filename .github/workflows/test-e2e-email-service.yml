name: test-e2e-email-service

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: vb-free-vm
  VAULT_ROLE: github-actions-role
  VAULT_AUDIENCE: https://github.com/iamharryliu/vigilant-broccoli

jobs:
  test-email-service:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Setup Vault CA Certificate
        run: |
          CA_CERT_BASE64=$(cat projects/nx-workspace/scripts/vault-ca.crt | base64 -w 0)
          echo "VAULT_CA_CERT_BASE64=$CA_CERT_BASE64" >> $GITHUB_ENV

      - name: Open IAP Tunnel to Vault
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-N" \
            --ssh-flag="-L 8200:127.0.0.1:8200" \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=3" &
          echo "Waiting for tunnel to establish..."
          for i in {1..30}; do
            if curl -k -s --max-time 2 https://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Tunnel established successfully"
              exit 0
            fi
            echo "Attempt $i: Tunnel not ready yet..."
            sleep 2
          done
          echo "ERROR: IAP tunnel to Vault failed to establish after 30 attempts"
          exit 1

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: https://127.0.0.1:8200
          caCertificate: ${{ env.VAULT_CA_CERT_BASE64 }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: ${{ env.VAULT_AUDIENCE }}
          secrets: |
            kv/data/secrets EMAIL_SERVICE_API_KEY | EMAIL_SERVICE_API_KEY ;

      - name: Test email service
        env:
          EMAIL_SERVICE_API_KEY: ${{ env.EMAIL_SERVICE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w '%{http_code}' \
            -X POST https://vb-email-service.fly.dev/queue-emails \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${EMAIL_SERVICE_API_KEY}" \
            -d '[{"from":"Harry Liu <ci-test@harryliu.dev>","to":"harryliu1995@gmail.com","subject":"ci-test: Email Service Test","html":"<p>Automated test from GitHub Actions.</p>"}]')
          echo "Response status: $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" = "200" ]; then
            echo "✓ Email service test passed"
          else
            echo "✗ Email service test failed"
            exit 1
          fi
