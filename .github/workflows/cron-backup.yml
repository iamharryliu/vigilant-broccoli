name: cron-backup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cron-backup.yml
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  backup-vb-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Upload backup to GCS
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          curl -sL -o vigilant-broccoli.zip https://github.com/iamharryliu/vigilant-broccoli/archive/refs/heads/main.zip
          gsutil cp vigilant-broccoli.zip gs://vigilant-broccoli-backup/repo-backup-$TIMESTAMP.zip

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/repo-backup-*.zip | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi

  backup-gitea:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets OCI_VM_SSH_KEY | OCI_VM_SSH_KEY ;
            kv/data/secrets GITEA_VM_IP | GITEA_VM_IP ;

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Dump Gitea and upload to GCS
        env:
          OCI_VM_SSH_KEY: ${{ env.OCI_VM_SSH_KEY }}
          GITEA_VM_IP: ${{ env.GITEA_VM_IP }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          # Ensure a trailing newline — the stored key lacks one and OpenSSL/libcrypto rejects it.
          { printf '%s' "$OCI_VM_SSH_KEY" | base64 -d; echo; } > ssh_key
          chmod 600 ssh_key
          SSH="ssh -i ssh_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 ubuntu@${GITEA_VM_IP}"
          # gitea dump writes the archive inside the container; copy it out to the host, then pull it.
          $SSH 'sudo docker exec -u git -w /tmp gitea gitea dump -t /tmp -c /data/gitea/conf/app.ini --file gitea-dump.zip \
            && sudo docker cp gitea:/tmp/gitea-dump.zip /tmp/gitea-dump.zip \
            && sudo chown "$(id -u):$(id -g)" /tmp/gitea-dump.zip \
            && sudo docker exec -u git gitea rm -f /tmp/gitea-dump.zip'
          scp -i ssh_key -o StrictHostKeyChecking=accept-new "ubuntu@${GITEA_VM_IP}:/tmp/gitea-dump.zip" gitea-dump.zip
          $SSH 'sudo rm -f /tmp/gitea-dump.zip'
          gsutil cp gitea-dump.zip "gs://vigilant-broccoli-backup/gitea-backup-$TIMESTAMP.zip"
          rm -f ssh_key gitea-dump.zip

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/gitea-backup-*.zip | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi

  backup-mongodb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets MONGODB_URI | MONGODB_URI ;

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Install mongodb-database-tools
        run: |
          curl -sL -o mongodb-tools.deb https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.10.0.deb
          sudo dpkg -i mongodb-tools.deb

      - name: Dump and upload backup to GCS
        env:
          MONGODB_URI: ${{ env.MONGODB_URI }}
          MONGODB_DB: vb-manager
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          mongodump --uri="$MONGODB_URI" --db="$MONGODB_DB" --archive="mongodb-$MONGODB_DB.gz" --gzip
          gsutil cp "mongodb-$MONGODB_DB.gz" "gs://vigilant-broccoli-backup/mongodb-backup-$TIMESTAMP.gz"

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/mongodb-backup-*.gz | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi

  backup-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Import Secrets from Vault
        uses: ./.github/actions/vault-secrets
        with:
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          secrets: |
            kv/data/secrets SUPABASE_DB_URL | SUPABASE_DB_URL ;

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Install PostgreSQL client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -sL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          sudo sed -i 's|deb |deb [signed-by=/usr/share/keyrings/postgresql.gpg] |' /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump and upload backup to GCS
        env:
          SUPABASE_DB_URL: ${{ env.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges | gzip > "supabase.sql.gz"
          gsutil cp "supabase.sql.gz" "gs://vigilant-broccoli-backup/supabase-backup-$TIMESTAMP.sql.gz"

      - name: Cleanup old backups
        run: |
          MAX_BACKUPS=7
          BACKUPS=$(gsutil ls gs://vigilant-broccoli-backup/supabase-backup-*.sql.gz | sort)
          BACKUP_COUNT=$(echo "$BACKUPS" | wc -l)
          if [ "$BACKUP_COUNT" -gt "$MAX_BACKUPS" ]; then
            DELETE_COUNT=$((BACKUP_COUNT - MAX_BACKUPS))
            echo "$BACKUPS" | head -n "$DELETE_COUNT" | xargs gsutil rm
          fi
