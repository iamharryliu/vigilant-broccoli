<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vigilant-broccoli — Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <main class="mx-auto max-w-3xl px-6 py-16">
      <header class="mb-12">
        <a href="./" class="text-sm text-gray-500 dark:text-gray-400 hover:underline">&larr; Back</a>
        <h1 class="mt-2 text-3xl font-bold tracking-tight">Status</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">
          Fly.io service health, probed by
          <a href="https://upptime.js.org" class="underline" target="_blank" rel="noopener">Upptime</a>
          every 10 minutes.
          <span id="updated" class="block mt-1 text-xs"></span>
        </p>
      </header>

      <ul id="services" class="grid gap-4 sm:grid-cols-2">
        <li class="text-sm text-gray-500 dark:text-gray-400">Loading status…</li>
      </ul>

      <footer class="mt-12 text-xs text-gray-500 dark:text-gray-400">
        Raw history:
        <a class="underline" target="_blank" rel="noopener" href="https://github.com/iamharryliu/vigilant-broccoli/tree/main/history">github.com/.../history</a>
      </footer>
    </main>

    <script>
      const SUMMARY_URL =
        'https://raw.githubusercontent.com/iamharryliu/vigilant-broccoli/main/history/summary.json';
      const STATUS_COLORS = {
        up: { dot: 'bg-emerald-500', label: 'Up', text: 'text-emerald-600 dark:text-emerald-400' },
        down: { dot: 'bg-red-500', label: 'Down', text: 'text-red-600 dark:text-red-400' },
        degraded: { dot: 'bg-amber-500', label: 'Degraded', text: 'text-amber-600 dark:text-amber-400' },
        unknown: { dot: 'bg-gray-400', label: 'Unknown', text: 'text-gray-500 dark:text-gray-400' },
      };

      const escapeHtml = s =>
        String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[c]);

      const renderService = svc => {
        const status = STATUS_COLORS[svc.status] || STATUS_COLORS.unknown;
        const uptime = svc.uptime || '—';
        const responseMs = typeof svc.time === 'number' ? `${svc.time} ms` : '—';
        const name = escapeHtml(svc.name);
        const url = escapeHtml(svc.url);
        return `
          <li>
            <a href="${url}" target="_blank" rel="noopener noreferrer"
               class="block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 hover:border-gray-400 dark:hover:border-gray-500 transition">
              <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold">${name}</h2>
                <span class="flex items-center gap-2 text-sm ${status.text}">
                  <span class="inline-block h-2.5 w-2.5 rounded-full ${status.dot}"></span>
                  ${status.label}
                </span>
              </div>
              <dl class="mt-3 grid grid-cols-2 gap-2 text-sm text-gray-600 dark:text-gray-400">
                <div>
                  <dt class="text-xs uppercase tracking-wide">Uptime (avg)</dt>
                  <dd class="font-mono">${escapeHtml(uptime)}</dd>
                </div>
                <div>
                  <dt class="text-xs uppercase tracking-wide">Response</dt>
                  <dd class="font-mono">${escapeHtml(responseMs)}</dd>
                </div>
              </dl>
            </a>
          </li>
        `;
      };

      const render = services => {
        const list = document.getElementById('services');
        if (!services.length) {
          list.innerHTML =
            '<li class="text-sm text-gray-500 dark:text-gray-400">No services configured.</li>';
          return;
        }
        list.innerHTML = services.map(renderService).join('');
      };

      const renderError = msg => {
        document.getElementById('services').innerHTML = `
          <li class="text-sm text-red-600 dark:text-red-400">${escapeHtml(msg)}</li>
        `;
      };

      const setUpdated = isoString => {
        const el = document.getElementById('updated');
        if (!isoString) return;
        const d = new Date(isoString);
        if (Number.isNaN(d.getTime())) return;
        el.textContent = `Last updated ${d.toLocaleString()}`;
      };

      (async () => {
        try {
          const res = await fetch(`${SUMMARY_URL}?t=${Date.now()}`, {
            cache: 'no-store',
          });
          if (!res.ok) {
            renderError(
              `Status data not available yet (HTTP ${res.status}). The upptime workflow may not have run yet.`,
            );
            return;
          }
          setUpdated(res.headers.get('last-modified'));
          const data = await res.json();
          render(Array.isArray(data) ? data : []);
        } catch (err) {
          renderError(`Failed to load status: ${err.message}`);
        }
      })();
    </script>
  </body>
</html>
