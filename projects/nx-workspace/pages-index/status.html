<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vigilant-broccoli — Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen"
  >
    <main class="mx-auto max-w-3xl px-6 py-8">
      <header class="mb-6">
        <a
          href="./"
          class="text-sm text-gray-500 dark:text-gray-400 hover:underline"
          >&larr; Back</a
        >
        <h1 class="mt-2 text-3xl font-bold tracking-tight">Status</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">
          Fly.io service health, probed by
          <a
            href="https://upptime.js.org"
            class="underline"
            target="_blank"
            rel="noopener"
            >Upptime</a
          >
          hourly.
          <span id="updated" class="block mt-1 text-xs"></span>
        </p>
      </header>

      <ul id="services" class="grid gap-3 sm:grid-cols-2">
        <li class="text-sm text-gray-500 dark:text-gray-400">
          Loading status…
        </li>
      </ul>

      <section class="mt-8">
        <div class="flex items-baseline justify-between">
          <h2 class="text-lg font-semibold">GitHub Actions</h2>
          <a
            href="https://github.com/iamharryliu/vigilant-broccoli/actions"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sm text-gray-500 dark:text-gray-400 hover:underline"
          >
            View all &rarr;
          </a>
        </div>
        <div
          id="badges"
          class="mt-4 flex flex-wrap gap-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4"
        >
          <span class="text-sm text-gray-500 dark:text-gray-400"
            >Loading workflows…</span
          >
        </div>
      </section>

      <footer class="mt-8 text-xs text-gray-500 dark:text-gray-400">
        Raw history:
        <a
          class="underline"
          target="_blank"
          rel="noopener"
          href="https://github.com/iamharryliu/vigilant-broccoli/tree/main/history"
          >github.com/.../history</a
        >
      </footer>
    </main>

    <script>
      const SUMMARY_URL =
        'https://raw.githubusercontent.com/iamharryliu/vigilant-broccoli/main/history/summary.json';
      const STATUS_COLORS = {
        up: {
          dot: 'bg-emerald-500',
          label: 'Up',
          text: 'text-emerald-600 dark:text-emerald-400',
        },
        down: {
          dot: 'bg-red-500',
          label: 'Down',
          text: 'text-red-600 dark:text-red-400',
        },
        degraded: {
          dot: 'bg-amber-500',
          label: 'Degraded',
          text: 'text-amber-600 dark:text-amber-400',
        },
        unknown: {
          dot: 'bg-gray-400',
          label: 'Unknown',
          text: 'text-gray-500 dark:text-gray-400',
        },
      };

      const escapeHtml = s =>
        String(s).replace(
          /[&<>"']/g,
          c =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;',
            })[c],
        );

      const renderService = svc => {
        const status = STATUS_COLORS[svc.status] || STATUS_COLORS.unknown;
        const uptime = svc.uptime || '—';
        const responseMs =
          typeof svc.time === 'number' ? `${svc.time} ms` : '—';
        const name = escapeHtml(svc.name);
        const url = escapeHtml(svc.url);
        return `
          <li>
            <a href="${url}" target="_blank" rel="noopener noreferrer"
               class="block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 hover:border-gray-400 dark:hover:border-gray-500 transition">
              <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold">${name}</h2>
                <span class="flex items-center gap-2 text-sm ${status.text}">
                  <span class="inline-block h-2.5 w-2.5 rounded-full ${status.dot}"></span>
                  ${status.label}
                </span>
              </div>
              <dl class="mt-2 grid grid-cols-2 gap-2 text-sm text-gray-600 dark:text-gray-400">
                <div>
                  <dt class="text-xs uppercase tracking-wide">Uptime (avg)</dt>
                  <dd class="font-mono">${escapeHtml(uptime)}</dd>
                </div>
                <div>
                  <dt class="text-xs uppercase tracking-wide">Response</dt>
                  <dd class="font-mono">${escapeHtml(responseMs)}</dd>
                </div>
              </dl>
            </a>
          </li>
        `;
      };

      const render = services => {
        const list = document.getElementById('services');
        if (!services.length) {
          list.innerHTML =
            '<li class="text-sm text-gray-500 dark:text-gray-400">No services configured.</li>';
          return;
        }
        list.innerHTML = services.map(renderService).join('');
      };

      const renderError = msg => {
        document.getElementById('services').innerHTML = `
          <li class="text-sm text-red-600 dark:text-red-400">${escapeHtml(msg)}</li>
        `;
      };

      const setUpdated = isoString => {
        const el = document.getElementById('updated');
        if (!isoString) return;
        const d = new Date(isoString);
        if (Number.isNaN(d.getTime())) return;
        el.textContent = `Last updated ${d.toLocaleString()}`;
      };

      (async () => {
        try {
          const res = await fetch(`${SUMMARY_URL}?t=${Date.now()}`, {
            cache: 'no-store',
          });
          if (!res.ok) {
            renderError(
              `Status data not available yet (HTTP ${res.status}). The upptime workflow may not have run yet.`,
            );
            return;
          }
          setUpdated(res.headers.get('last-modified'));
          const data = await res.json();
          render(Array.isArray(data) ? data : []);
        } catch (err) {
          renderError(`Failed to load status: ${err.message}`);
        }
      })();

      const REPO_OWNER = 'iamharryliu';
      const REPO_NAME = 'vigilant-broccoli';
      const WORKFLOWS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows`;

      const toWorkflowUrl = htmlUrl => {
        try {
          const url = new URL(htmlUrl);
          if (url.hostname !== 'github.com') return null;
          const parts = url.pathname.split('/').filter(Boolean);
          if (parts.length < 7) return null;
          const [owner, repo, blob, , ...rest] = parts;
          if (blob !== 'blob') return null;
          const idx = rest.indexOf('.github');
          if (idx === -1 || rest[idx + 1] !== 'workflows') return null;
          const file = rest.slice(idx + 2).join('/');
          return `https://github.com/${owner}/${repo}/actions/workflows/${file}`;
        } catch {
          return null;
        }
      };

      const renderBadges = items => {
        const container = document.getElementById('badges');
        if (!items.length) {
          container.innerHTML =
            '<span class="text-sm text-gray-500 dark:text-gray-400">No workflows found.</span>';
          return;
        }
        container.innerHTML = items
          .map(
            b => `
              <a href="${escapeHtml(b.href)}" target="_blank" rel="noopener noreferrer"
                 class="inline-block origin-left transition-transform duration-200 ease-out hover:scale-105 hover:-translate-y-0.5 hover:drop-shadow-md">
                <img src="${escapeHtml(b.src)}" alt="${escapeHtml(b.alt)}" loading="lazy" class="max-w-full h-auto" />
              </a>
            `,
          )
          .join('');
      };

      const renderBadgesError = msg => {
        document.getElementById('badges').innerHTML = `
          <span class="text-sm text-red-600 dark:text-red-400">${escapeHtml(msg)}</span>
        `;
      };

      (async () => {
        try {
          const res = await fetch(WORKFLOWS_API);
          if (!res.ok) {
            renderBadgesError(`Could not load workflows (HTTP ${res.status}).`);
            return;
          }
          const { workflows = [] } = await res.json();
          const items = workflows
            .map(wf => ({
              alt: wf.name,
              href: toWorkflowUrl(wf.html_url) || wf.html_url || '#',
              src: wf.badge_url,
            }))
            .sort((a, b) => a.alt.localeCompare(b.alt));
          renderBadges(items);
        } catch (err) {
          renderBadgesError(`Failed to load workflows: ${err.message}`);
        }
      })();
    </script>
  </body>
</html>
