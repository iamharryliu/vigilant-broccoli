<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vigilant-broccoli — Open Source</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen"
  >
    <main class="mx-auto max-w-3xl px-6 py-16">
      <header class="mb-12">
        <a
          href="./"
          class="text-sm text-gray-500 dark:text-gray-400 hover:underline"
          >&larr; Back</a
        >
        <h1 class="mt-2 text-3xl font-bold tracking-tight">Open Source</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">
          GitHub, Docker Hub, and npm packages.
        </p>
      </header>

      <ul class="grid gap-4 sm:grid-cols-2">
        <li>
          <a
            href="https://github.com/iamharryliu/vigilant-broccoli"
            target="_blank"
            rel="noopener noreferrer"
            class="block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 hover:border-gray-400 dark:hover:border-gray-500 transition"
          >
            <h2 class="text-lg font-semibold">GitHub</h2>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">
              vigilant-broccoli repository.
            </p>
          </a>
        </li>
        <li>
          <a
            href="https://hub.docker.com/repositories/iamharryliu"
            target="_blank"
            rel="noopener noreferrer"
            class="block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 hover:border-gray-400 dark:hover:border-gray-500 transition"
          >
            <h2 class="text-lg font-semibold">Docker Hub</h2>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">
              iamharryliu Docker images.
            </p>
          </a>
        </li>
        <li>
          <a
            href="https://www.npmjs.com/settings/vigilant-broccoli/packages"
            target="_blank"
            rel="noopener noreferrer"
            class="block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-6 hover:border-gray-400 dark:hover:border-gray-500 transition"
          >
            <h2 class="text-lg font-semibold">npm</h2>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">
              vigilant-broccoli npm packages.
            </p>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
