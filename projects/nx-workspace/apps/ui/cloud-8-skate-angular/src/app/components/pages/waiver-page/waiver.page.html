<app-content-container>
  <section class="mb-8 reveal-up">
    <h1 class="text-3xl font-bold mb-4 lg:text-4xl reveal-up reveal-up-delay-1">
      Waiver
    </h1>
    <p
      class="text-base leading-7 text-gray-700 mb-8 reveal-up reveal-up-delay-2"
    >
      All participants must review the waiver before joining any Cloud8Skate
      city skate event.
    </p>
    <div class="text-center reveal-up">
      <a
        [href]="waiverUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center rounded-full bg-blue-500 px-8 py-3 text-lg font-medium text-white transition hover:bg-blue-700 interactive-chip"
      >
        View Waiver
      </a>
    </div>
  </section>
</app-content-container>
