<div
  class="lg:rounded-2xl lg:bg-white/70 lg:backdrop-blur-md lg:shadow-lg lg:p-10"
>
  <section class="mb-6 reveal-up hidden lg:block">
    <h2 class="mb-3 text-3xl font-bold lg:text-4xl">Calendar</h2>
    <p class="text-base leading-7 text-gray-700">
      Upcoming Cloud8 sessions, meetups, and skate events.
    </p>
  </section>
  <iframe
    [src]="iframeSrc"
    class="reveal-up reveal-up-delay-1 rounded-xl shadow-sm"
    style="border: solid 1px #777"
    width="100%"
    height="500"
    frameborder="0"
    scrolling="no"
  ></iframe>
</div>
