<nav
  class="hidden lg:block sticky top-0 bg-inherit transition-opacity duration-500"
>
  <div class="flex items-center h-16 ml-6 space-x-6">
    @for (link of links; track link.text) {
    <a
      [routerLink]="link.url.internal"
      routerLinkActive="text-blue-600 dark:text-blue-400 font-semibold"
      class="text-sm relative py-1 transition-all duration-200 hover:text-blue-600 dark:hover:text-blue-400 after:content-[''] after:absolute after:left-0 after:bottom-0 after:w-0 after:h-0.5 after:bg-blue-600 dark:after:bg-blue-400 after:transition-all after:duration-200 hover:after:w-full"
    >
      {{ link.text }}
    </a>
    }
  </div>
  <hr />
</nav>

<div
  class="lg:hidden bg-white dark:bg-gray-900 sticky top-0 z-10 transition-opacity duration-500"
>
  <div class="flex justify-between ml-4 mr-8 pt-3 pb-3">
    <div></div>
    <button
      (click)="isMobileNavOpen = !isMobileNavOpen"
      class="text-gray-600 dark:text-gray-300 focus:outline-none"
    >
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div
    class="absolute w-full bg-gray-100 dark:bg-gray-800 pt-3 pb-3"
    [class.hidden]="!isMobileNavOpen"
  >
    <div class="space-y-1">
      @for (link of links; track link.text) {
      <div class="flex justify-center">
        <a
          [routerLink]="link.url.internal"
          routerLinkActive="text-blue-600 dark:text-blue-400 font-semibold"
          (click)="isMobileNavOpen = false"
          class="text-sm px-4 py-2 rounded-lg transition-all duration-200 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          {{ link.text }}
        </a>
      </div>
      }
    </div>
  </div>
  <hr />
</div>
