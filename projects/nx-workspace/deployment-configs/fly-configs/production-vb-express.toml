app = 'production-vb-express'
primary_region = 'yyz'

[build]

[env]
  PORT = '3000'
  HOST = '0.0.0.0'
  EMAIL_SERVICE_URL = 'https://production-vb-email-service.fly.dev'
  LLM_SERVICE_URL = 'https://production-vb-llm-service.fly.dev'
  DATABASE_PATH = '/data/vb-express.sqlite'
  BETTER_AUTH_URL = 'https://production-vb-express.fly.dev'

[mounts]
  source = 'vb_express_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
