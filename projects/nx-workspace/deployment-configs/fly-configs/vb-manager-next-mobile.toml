app = 'vb-manager-next-mobile'
primary_region = 'yyz'

[build]

[env]
  PORT = '3000'
  HOSTNAME = '0.0.0.0'
  BETTER_AUTH_URL = 'https://vb-manager-next-mobile.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
