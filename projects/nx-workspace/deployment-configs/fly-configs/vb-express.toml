app = 'vb-express'
primary_region = 'yyz'

[build]

[env]
  PORT = '3000'
  HOST = '0.0.0.0'
  EMAIL_SERVICE_URL = 'https://vb-email-service.fly.dev'
  CLOUDFLARE_BUCKET_NAME = 'storage-buckets'
  GOOGLE_GCS_PROJECT_ID = 'vigilant-broccoli'
  GOOGLE_GCS_BUCKET_NAME = 'vb-storage-bucket'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
