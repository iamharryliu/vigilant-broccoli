[allowlist]
description = "Gitleaks allowlist for known false positives and test credentials"

# Environment and config files with public/test credentials
paths = [
  "(?:.*\\.env\\.(?:development|production))$",
  "(?:.*project\\.json)$",
  "(?:.*deployment-configs/.*\\.toml)$",
  "(?:scripts/shell/test-.*\\.sh)$",
  "(?:notes/software/.*\\.md)$",
  "(?:scripts/node/google-tasks/.*\\.json)$",
  "(?:projects/sandbox/.*\\.json)$",
  "(?:personal-website/src/environment/.*\\.ts)$"
]

# Public API keys that are safe to commit
regexes = [
  "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY",
  "RECAPTCHA_V3_SITE_KEY",
  "nxCloudAccessToken"
]

