#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2

write_files:
  # Cloudflare Origin CA cert — ACME can't complete behind the proxy/Access
  - path: /opt/gitea/origin.crt
    permissions: '0644'
    content: |
      ${indent(6, gitea_origin_cert)}
  - path: /opt/gitea/origin.key
    permissions: '0600'
    content: |
      ${indent(6, gitea_origin_key)}
  - path: /opt/gitea/Caddyfile
    content: |
      ${gitea_domain} {
        tls /etc/caddy/origin.crt /etc/caddy/origin.key
        reverse_proxy gitea:3000
      }

  - path: /opt/gitea/docker-compose.yml
    content: |
      services:
        gitea:
          image: gitea/gitea:latest
          container_name: gitea
          restart: unless-stopped
          environment:
            USER_UID: "1000"
            USER_GID: "1000"
            GITEA__database__DB_TYPE: sqlite3
            GITEA__server__DOMAIN: ${gitea_domain}
            GITEA__server__ROOT_URL: https://${gitea_domain}/
            GITEA__server__SSH_DOMAIN: ${gitea_ssh_domain}
            GITEA__server__SSH_PORT: "2222"
            GITEA__server__SSH_LISTEN_PORT: "22"
            GITEA__service__DISABLE_REGISTRATION: "true"
            GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
          volumes:
            - /mnt/gitea-data:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
          ports:
            - "2222:22"
          healthcheck:
            test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
            interval: 30s
            timeout: 5s
            retries: 5
        caddy:
          image: caddy:2-alpine
          container_name: caddy
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - /opt/gitea/Caddyfile:/etc/caddy/Caddyfile:ro
            - /opt/gitea/origin.crt:/etc/caddy/origin.crt:ro
            - /opt/gitea/origin.key:/etc/caddy/origin.key:ro
            - caddy_data:/data
            - caddy_config:/config
          depends_on:
            - gitea
      volumes:
        caddy_data:
        caddy_config:

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
  # Mount the attached block volume at /mnt/gitea-data BEFORE Docker starts, so
  # Gitea's /data bind-mount lands on the persistent volume, not the boot disk.
  # Detect the data disk as the whole disk that is NOT the boot disk (device
  # names like /dev/sdb aren't stable), format only if blank, and mount by UUID
  # — a re-provision reattaches existing repo/DB data intact instead of wiping.
  - mkdir -p /mnt/gitea-data
  - 'ROOT_DISK=$(lsblk -no PKNAME "$(findmnt -no SOURCE /)" | head -1); for d in $(lsblk -dno NAME --nodeps -e7); do [ "$d" = "$ROOT_DISK" ] && continue; DATA_DEV="/dev/$d"; break; done; blkid "$DATA_DEV" || mkfs.ext4 -F "$DATA_DEV"; DATA_UUID=$(blkid -s UUID -o value "$DATA_DEV"); grep -q "$DATA_UUID" /etc/fstab || echo "UUID=$DATA_UUID /mnt/gitea-data ext4 defaults,_netdev,nofail 0 2" >> /etc/fstab'
  - mount /mnt/gitea-data
  - docker compose -f /opt/gitea/docker-compose.yml up -d
