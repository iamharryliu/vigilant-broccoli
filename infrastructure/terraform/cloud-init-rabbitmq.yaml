#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2

write_files:
  - path: /opt/rabbitmq/rabbitmq.conf
    content: |
      listeners.ssl.default = 5671
      ssl_options.cacertfile            = /etc/rabbitmq/certs/ca.crt
      ssl_options.certfile              = /etc/rabbitmq/certs/server.crt
      ssl_options.keyfile               = /etc/rabbitmq/certs/server.key
      ssl_options.verify                = verify_peer
      ssl_options.fail_if_no_peer_cert  = false
      management.ssl.port       = 15671
      management.ssl.cacertfile = /etc/rabbitmq/certs/ca.crt
      management.ssl.certfile   = /etc/rabbitmq/certs/server.crt
      management.ssl.keyfile    = /etc/rabbitmq/certs/server.key

  - path: /opt/rabbitmq/certs/server.key
    permissions: '0644'
    content: |
      ${indent(6, rabbitmq_tls_key)}

  - path: /opt/rabbitmq/certs/server.crt
    permissions: '0644'
    content: |
      ${indent(6, rabbitmq_tls_cert)}

  - path: /opt/rabbitmq/certs/ca.crt
    permissions: '0644'
    content: |
      ${indent(6, rabbitmq_ca_cert)}

  - path: /opt/socket-server/Caddyfile
    content: |
      {
        email ${acme_email}
      }

      ${socket_server_domain} {
        reverse_proxy socket-server-socketio:3000
      }

  - path: /opt/rabbitmq/docker-compose.yml
    content: |
      services:
        rabbitmq:
          image: rabbitmq:3-management-alpine
          container_name: rabbitmq
          restart: unless-stopped
          environment:
            RABBITMQ_DEFAULT_USER: ${rabbitmq_user}
            RABBITMQ_DEFAULT_PASS: ${rabbitmq_password}
          ports:
            - "5671:5671"
            - "5672:5672"
            - "15671:15671"
            - "15672:15672"
          volumes:
            - rabbitmq_data:/var/lib/rabbitmq
            - /opt/rabbitmq/certs:/etc/rabbitmq/certs:ro
            - /opt/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
          healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
            interval: 10s
            timeout: 5s
            retries: 5
        socket-server-socketio:
          image: iamharryliu/socket-server-socketio:latest
          container_name: socket-server-socketio
          restart: unless-stopped
          pull_policy: always
          environment:
            HOST: 0.0.0.0
            PORT: "3000"
            SENDER_TOKEN: ${shared_app_token}
          labels:
            com.centurylinklabs.watchtower.enable: "true"
          healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
            interval: 30s
            timeout: 5s
            retries: 3
        caddy:
          image: caddy:2-alpine
          container_name: caddy
          restart: unless-stopped
          pull_policy: always
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - /opt/socket-server/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
          depends_on:
            - socket-server-socketio
          labels:
            com.centurylinklabs.watchtower.enable: "true"
        watchtower:
          image: containrrr/watchtower
          container_name: watchtower
          restart: unless-stopped
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
          environment:
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_POLL_INTERVAL: "300"
            WATCHTOWER_LABEL_ENABLE: "true"
            DOCKER_API_VERSION: DOCKER_API_VERSION_PLACEHOLDER
      volumes:
        rabbitmq_data:
        caddy_data:
        caddy_config:

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
  - 'DOCKER_API=$(docker version --format "{{.Server.APIVersion}}") && sed -i "s/DOCKER_API_VERSION_PLACEHOLDER/$DOCKER_API/" /opt/rabbitmq/docker-compose.yml'
  - docker compose -f /opt/rabbitmq/docker-compose.yml up -d
  - sleep 15
  - docker exec rabbitmq rabbitmqctl set_user_tags ${rabbitmq_user} administrator
  - docker exec rabbitmq rabbitmqctl set_permissions -p / ${rabbitmq_user} ".*" ".*" ".*"
